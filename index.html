<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 수주율 관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
  /* 🎨 원본 CSS 디자인 절대 보존 구역 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeece6;
    --bg-info: #e6f1fb; --text-primary: #1a1a18; --text-secondary: #6b6b67;
    --text-tertiary: #a0a09a; --text-info: #0c447c;
    --border: rgba(0,0,0,0.10); --border-hover: rgba(0,0,0,0.22);
    --radius-md: 8px; --radius-lg: 12px;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --bg-info: #0c2440; --text-primary: #f0ede6; --text-secondary: #a0a09a;
      --text-tertiary: #6b6b67; --text-info: #85b7eb;
      --border: rgba(255,255,255,0.10); --border-hover: rgba(255,255,255,0.22);
    }
  }

  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
  
  /* ✅ 수정된 부분: 대시보드 가로 여백을 완전히 없애고 100% 풀사이즈로 확장 */
  .app { max-width: 100%; margin: 0 auto; padding: 1.5rem; }
  
  .shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }

  .header { padding: 1.1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 16px; font-weight: 600; }
  .header-left p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .header-actions { display: flex; gap: 7px; align-items: center; }

  .tab-bar { display: flex; padding: 0 1.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab { padding: 11px 14px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; transition: color 0.15s; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text-primary); }

  .content { padding: 1.25rem 1.5rem; display: none; }
  .content.active { display: block; }

  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
  .green { color: #3B6D11; } .amber { color: #854F0B; }
  @media (prefers-color-scheme: dark) { .green { color: #97C459; } .amber { color: #EF9F27; } }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .card-pad { padding: 1rem; }
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }

  .table-wrap { overflow-x: auto; border: 0.5px solid var(--border); border-radius: var(--radius-md); }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead tr { background: var(--bg-secondary); }
  th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  th.check-col, td.check-col { width: 36px; text-align: center; padding: 9px 8px; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-secondary); }
  tr.row-selected td { background: #FFF9F0; }
  @media (prefers-color-scheme: dark) { tr.row-selected td { background: #2a2519; } }
  input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--text-primary); cursor: pointer; }

  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .b-wait { background: #FAEEDA; color: #633806; }
  .b-quoted { background: #E6F1FB; color: #0C447C; }
  .b-won { background: #EAF3DE; color: #27500A; }
  .b-lost { background: #FCEBEB; color: #791F1F; }
  .b-checking { background: #FFF4E5; color: #854F0B; border: 0.5px solid #EF9F27; }
  .b-unquotable { background: #f0ede6; color: #6b6b67; }

  .action-group { display: flex; gap: 5px; align-items: center; flex-wrap: nowrap; }
  .act-btn { display: inline-flex; align-items: center; gap: 3px; padding: 4px 9px; border-radius: 6px; font-size: 11px; border: 0.5px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; white-space: nowrap; font-family: var(--font); transition: background 0.12s; }
  .act-btn:hover { background: var(--bg-tertiary); border-color: var(--border-hover); }
  .act-btn.act-blue { background: #E6F1FB; color: #0C447C; border-color: #B5D4F4; }
  .act-btn.act-blue:hover { background: #d0e5f7; }
  .act-btn.act-green { background: #EAF3DE; color: #27500A; border-color: #C0DD97; }
  .act-btn.act-green:hover { background: #d9eecc; }
  .act-btn.act-amber { background: #FFF4E5; color: #854F0B; border-color: #FAC775; font-weight: 600; }

  .bulk-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #FAEEDA; border-radius: var(--radius-md); margin-bottom: 10px; border: 0.5px solid #FAC775; }
  .bulk-bar-count { font-size: 13px; color: #633806; font-weight: 500; flex: 1; }
  .bulk-del-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; border: 0.5px solid #F09595; background: #fff; color: #791F1F; cursor: pointer; font-family: var(--font); }
  .bulk-del-btn:hover { background: #FCEBEB; }
  .bulk-cancel-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; border: 0.5px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; font-family: var(--font); }
  .bulk-cancel-btn:hover { background: var(--bg-secondary); }

  .btn { padding: 6px 13px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-primary); font-family: var(--font); transition: background 0.15s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  .btn-primary:hover { opacity: 0.85; background: var(--text-primary); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  .dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 1.1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-head h2 { font-size: 15px; font-weight: 500; }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-foot { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .x-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-secondary); line-height: 1; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-full { grid-column: 1 / -1; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .fg input, .fg select, .fg textarea { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 8px 10px; font-size: 13px; font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); }
  .fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--border-hover); }

  #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; z-index: 5000; }
  .login-card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2.5rem 2rem; text-align: center; width: 90%; max-width: 380px; }
  .google-btn { width: 100%; padding: 12px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: var(--bg-primary); cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-primary); transition: 0.2s; }
  .google-btn:hover { background: var(--bg-secondary); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="margin-bottom:10px; font-size:18px;">어벤션 견적 관리</h1>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">회사 계정(@avention.co.kr)으로 로그인하세요.</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google 로그인
    </button>
  </div>
</div>

<div class="app" id="main-app">
  <div class="shell">
    <div class="header">
      <div class="header-left">
        <h1>견적 수주율 관리 대시보드</h1>
        <p id="user-info">접속 중...</p>
      </div>
      <div class="header-actions">
        <span id="pending-notif" style="display:none;font-size:12px;color:#854F0B;background:#FAEEDA;padding:4px 10px;border-radius:20px;"></span>
        <button class="btn btn-primary" onclick="openInqModal()">+ 견적 문의 등록</button>
        <button class="btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
      <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
      <div class="tab" onclick="switchTab('notifications',this)">알림 <span id="notif-dot"></span></div>
      <div class="tab" onclick="switchTab('analytics',this)">분석</div>
    </div>

    <div id="tab-dashboard" class="content active">
      <div class="metrics" id="metrics"></div>
      <div class="two-col">
        <div class="card card-pad" id="rep-stats"></div>
        <div class="card" id="recent-list"></div>
      </div>
      <div class="card card-pad" style="margin-top:1rem;">
        <div class="chart-wrap" style="height:200px;"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>

    <div id="tab-inquiries" class="content">
      <div class="filter-bar">
        <select id="f-rep" onchange="applyFilters()"><option value="">전체 담당자</option><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select>
        <select id="f-status" onchange="applyFilters()"><option value="">전체 상태</option><option>대기</option><option>확인 중</option><option>견적완료</option><option>견적불가</option></select>
        <select id="f-result" onchange="applyFilters()"><option value="">전체 수주결과</option><option>수주</option><option>미수주</option></select>
        <input type="text" id="f-search" placeholder="고객/제품/엔드유저/메모 검색" onkeyup="applyFilters()" style="padding: 6px 10px; font-size: 12px; width: 180px; border:0.5px solid var(--border); border-radius:var(--radius-md);">
        <input type="date" id="f-start-date" onchange="applyFilters()" style="padding: 5px 8px; font-size: 11px; border:0.5px solid var(--border); border-radius:var(--radius-md);">
        <span style="font-size:12px; color:var(--text-secondary);">~</span>
        <input type="date" id="f-end-date" onchange="applyFilters()" style="padding: 5px 8px; font-size: 11px; border:0.5px solid var(--border); border-radius:var(--radius-md);">
        <button class="btn" onclick="resetFilters()" style="padding: 5px 8px; font-size: 11px;">초기화</button>
        <span style="flex:1;"></span>
        <span id="table-count" style="font-size:12px;color:var(--text-secondary);"></span>
        <button class="btn" onclick="downloadExcel()" style="display:flex;align-items:center;gap:5px;">엑셀 다운로드</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th class="check-col"><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>
            <th style="cursor:pointer;" onclick="setSort('date')">문의일 <span id="sort-date">▼</span></th>
            <th style="cursor:pointer;" onclick="setSort('rep')">담당자 <span id="sort-rep"></span></th>
            <th style="cursor:pointer;" onclick="setSort('customer')">고객사 <span id="sort-customer"></span></th>
            <th style="cursor:pointer;" onclick="setSort('partNo')">Cat No. <span id="sort-partNo"></span></th>
            <th style="cursor:pointer;" onclick="setSort('product')">제품명 <span id="sort-product"></span></th>
            <th style="cursor:pointer;" onclick="setSort('spec')">Spec <span id="sort-spec"></span></th>
            <th style="cursor:pointer;" onclick="setSort('casNo')">CAS No. <span id="sort-casNo"></span></th>
            <th style="cursor:pointer;" onclick="setSort('pkg')">Package <span id="sort-pkg"></span></th>
            <th style="cursor:pointer;" onclick="setSort('qty')">수량 <span id="sort-qty"></span></th>
            <th style="cursor:pointer;" onclick="setSort('price')">금액 <span id="sort-price"></span></th>
            <th style="cursor:pointer;" onclick="setSort('delivery')">납기 <span id="sort-delivery"></span></th>
            <th style="cursor:pointer;" onclick="setSort('status')">상태 <span id="sort-status"></span></th>
            <th style="cursor:pointer;" onclick="setSort('endUser')">엔드유저 <span id="sort-endUser"></span></th>
            <th>메모</th><th>액션</th><th>수주결과</th>
          </tr></thead>
          <tbody id="inq-tbody"></tbody>
        </table>
      </div>
      <div id="pagination" style="display:flex; justify-content:center; gap:5px; margin-top:15px; margin-bottom: 5px;"></div>
    </div>

    <div id="tab-notifications" class="content"><div class="card" id="notif-list"></div></div>

    <div id="tab-analytics" class="content">
      <div class="two-col">
        <div class="card card-pad"><canvas id="rep-chart" style="height:220px;"></canvas></div>
        <div class="card card-pad"><canvas id="result-chart" style="height:220px;"></canvas></div>
      </div>
      <div class="two-col">
        <div class="card card-pad"><canvas id="amt-chart" style="height:220px;"></canvas></div>
        <div class="card card-pad"><canvas id="rate-chart" style="height:220px;"></canvas></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="inq-modal">
  <div class="modal">
    <div class="modal-head"><h2>신규 견적 문의 등록</h2><button class="x-btn" onclick="closeModal('inq-modal')">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg"><label>영업담당자</label><select id="i-rep"><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select></div>
        <div class="fg"><label>고객사 <span style="color:#E24B4A">*</span></label><input id="i-customer" type="text" placeholder="고객사명"></div>
        <div class="fg"><label>Cat No.</label><input id="i-partno" type="text" placeholder="예: G7513"></div>
        <div class="fg"><label>제품명 <span style="color:#E24B4A">*</span></label><input id="i-product" type="text" placeholder="제품명"></div>
        <div class="fg"><label>Spec</label><input id="i-spec" type="text" placeholder="Spec"></div>
        <div class="fg"><label>CAS No.</label><input id="i-casno" type="text" placeholder="예: 67-68-5"></div>
        <div class="fg"><label>Package</label><input id="i-pkg" type="text" placeholder="예: 500mL, 1g"></div>
        <div class="fg"><label>수량</label><input id="i-qty" type="text" placeholder="수량"></div>
        <div class="fg"><label>엔드유저</label><input id="i-enduser" type="text" placeholder="엔드유저명"></div>
        <div class="fg"><label>메모</label><input id="i-memo" type="text" placeholder="요청사항 등"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('inq-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry(false)">등록 + 닫기</button>
    </div>
  </div>
</div>

<div class="overlay" id="quote-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 입력</h2><button class="x-btn" onclick="closeModal('quote-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="quote-info"></div>
      <div class="form-grid">
        <div class="fg"><label>견적 금액 (원)</label><input id="q-price" type="text" oninput="this.value = this.value.replace(/[^0-9]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');"></div>
        <div class="fg"><label>예상 납기</label><input id="q-delivery" type="text"></div>
        <div class="fg"><label>공급사</label><input id="q-supplier" type="text"></div>
        <div class="fg"><label>처리 상태</label><select id="q-status"><option value="견적완료">정상 견적</option><option value="견적불가">견적 불가</option></select></div>
        <div class="fg form-full"><label>메모</label><textarea id="q-memo"></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('quote-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitQuote()">견적 저장 + 알림</button>
    </div>
  </div>
</div>

<div class="overlay" id="result-modal">
  <div class="modal" style="max-width:380px;">
    <div class="modal-head"><h2>수주 결과 업데이트</h2><button class="x-btn" onclick="closeModal('result-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="result-info"></div>
      <div class="fg" style="margin-top:12px;"><label>최종 판매가 (원)</label><input id="r-price" type="text" oninput="this.value = this.value.replace(/[^0-9]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');"></div>
      <div class="form-grid" style="margin-top:12px; margin-bottom:0;"><div class="fg"><label>최종 Package</label><input id="r-pkg" type="text"></div><div class="fg"><label>최종 수량</label><input id="r-qty" type="text"></div></div>
      <div class="fg" style="margin-top:12px;"><label>수주 결과</label><select id="r-result"><option value="">결과 선택</option><option value="수주">수주</option><option value="미수주">미수주</option></select></div>
      <div class="fg" style="margin-top:12px;"><label>메모 (사유)</label><textarea id="r-memo"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal('result-modal')">취소</button><button class="btn btn-primary" onclick="submitResult()">저장</button></div>
  </div>
</div>

<div class="overlay" id="log-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 이력 및 코멘트</h2><button class="x-btn" onclick="closeModal('log-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="log-info"></div>
      <div id="log-container" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; font-size: 12px; background: var(--bg-secondary); padding: 10px; border-radius: var(--radius-md);"></div>
      <div class="fg form-full"><label id="comment-label">코멘트 등록</label><textarea id="l-comment"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal('log-modal')">닫기</button><button class="btn btn-primary" onclick="submitComment()">등록</button></div>
  </div>
</div>

<script>
const CONFIG = {
  repEmails: { 'BML': 'avention@avention.co.kr', 'LSB': 'seungbin@avention.co.kr', 'POL': 'seungbin@avention.co.kr', 'YSJ': 'bio@avention.co.kr' },
  discordBuyer: 'https://discord.com/api/webhooks/1490536970223353947/fzC0wssKrg5FDqkURsh-PUpK7xfJzWNAcDyiFSxsczbQSYCLJGhSewbjeMf0lofc3iLc',
  discordRep:   'https://discord.com/api/webhooks/1490537189795303435/IZH8O3AXoP9vSE3EJc6sNJmM-MMWVjcUL32ufess1JfoX2w1JW9zrN8dv71TWsL-drQa',
  sheetsUrl: 'https://script.google.com/macros/s/AKfycbw5LjGHPe3F7xXiKvOgVQjQDOT1v8yhkL-QljQNzNvDvTJB_tjWLj6o64jZDWNMuzY6yw/exec'
};

const STATUS_BADGE = { '대기':'b-wait', '대기중':'b-wait', '확인 중':'b-checking', '견적완료':'b-quoted', '수주':'b-won', '미수주':'b-lost', '견적불가':'b-unquotable' };
const AV = ['av-b','av-t','av-c','av-p'];

const firebaseConfig = { apiKey: "AIzaSyDXolC9bL4pdBAcLTHC2tsEAmKkCilYAVw", authDomain: "avention-quote.firebaseapp.com", projectId: "avention-quote", storageBucket: "avention-quote.firebasestorage.app", messagingSenderId: "963602798000", appId: "1:963602798000:web:b9f126a5c44270c4c0b275" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let inquiries = [], notifs = [], currentUserEmail = "", nextId = 1;
let quoteTarget = null, logTarget = null, resultTarget = null;
let selectedIds = new Set(), selectedNotifIds = new Set(), charts = {};
let sortCol = 'date', sortDesc = true, currentPage = 1;
const itemsPerPage = 20;
let isSubmitting = false;

function esc(str) { return str == null ? '' : String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
function formatPrice(p) { const n = Number(String(p).replace(/,/g,'')); return (!p || isNaN(n) || n === 0) ? '-' : '₩' + n.toLocaleString(); }
function nowStr() { const d=new Date(); let h=d.getHours(); const ampm=h>=12?'오후':'오전'; h=h%12||12; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${ampm} ${String(h).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

function syncToSheets(inqData) { if (CONFIG.sheetsUrl) fetch(CONFIG.sheetsUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(inqData) }).catch(console.error); }
async function sendDiscord(url, embed) { try { await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({embeds:[embed]}) }); } catch(e){} }

auth.onAuthStateChanged(user => {
  if (user) {
    const email = user.email.toLowerCase();
    if (email.endsWith('@avention.co.kr') || email === 'ink@avention.co.kr') {
      currentUserEmail = email;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('user-info').textContent = `${user.displayName || email} 접속 중`;
      startSync();
    } else { alert("회사 계정(@avention.co.kr)만 접속 가능합니다."); auth.signOut(); }
  } else { document.getElementById('login-screen').style.display = 'flex'; }
});

function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout() { if(confirm('로그아웃 하시겠습니까?')) auth.signOut(); }

function startSync() {
  db.collection("inquiries").onSnapshot(snap => {
    inquiries = snap.docs.map(doc => { let d=doc.data(); d.id=parseInt(doc.id)||Date.now(); return d; });
    nextId = Math.max(0, ...inquiries.map(i=>Number(i.id)||0)) + 1;
    renderAll();
  });
  db.collection("notifs").orderBy("id", "desc").limit(50).onSnapshot(snap => {
    notifs = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
    renderNotifs(); updateBadges();
  });
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); document.getElementById('tab-'+name).classList.add('active');
  if(name==='inquiries') { applyFilters(); }
  if(name==='analytics') setTimeout(renderAnalytics, 60);
}

function resetFilters() { document.getElementById('f-rep').value=''; document.getElementById('f-status').value=''; document.getElementById('f-result').value=''; document.getElementById('f-search').value=''; applyFilters(); }
function applyFilters() { currentPage = 1; renderTable(); }
function setSort(col) { if (sortCol===col) sortDesc=!sortDesc; else { sortCol=col; sortDesc=true; } applyFilters(); }
function changePage(p) { currentPage = p; renderTable(); }

// ✅ 수정된 부분 2: 각 칸의 최소 너비를 살짝 줄여서 스크롤바가 안 생기게 최적화
function renderTable() {
  const isMaster = currentUserEmail === 'ink@avention.co.kr';
  let list = inquiries.filter(i => {
    const r=document.getElementById('f-rep').value, s=document.getElementById('f-status').value, res=document.getElementById('f-result').value, q=document.getElementById('f-search').value.toLowerCase();
    if(r && i.rep!==r) return false; if(s && i.status!==s) return false; if(res && i.result!==res) return false;
    if(q && !`${i.customer||''} ${i.product||''} ${i.spec||''} ${i.partNo||''} ${i.endUser||''} ${i.memo||''}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => {
    let va=a[sortCol], vb=b[sortCol];
    if (sortCol==='price'||sortCol==='qty'||sortCol==='id') { va=Number(va)||0; vb=Number(vb)||0; }
    else if (sortCol==='date') { if(a.date===b.date) return sortDesc?(b.id-a.id):(a.id-b.id); }
    return (va<vb ? -1 : (va>vb ? 1 : 0)) * (sortDesc ? -1 : 1);
  });

  document.getElementById('table-count').textContent = `총 ${list.length}건`;
  const startIdx = (currentPage - 1) * itemsPerPage;
  const pagedList = list.slice(startIdx, startIdx + itemsPerPage);

  document.getElementById('inq-tbody').innerHTML = pagedList.length ? pagedList.map(i => {
    const hasLog = i.logs && i.logs.some(l=>l.type==='comment');
    let btns = `<button class="act-btn ${hasLog?'act-amber':''}" onclick="openLogModal(${i.id})">이력</button>`;
    if(isMaster) {
      if(['대기','대기중'].includes(i.status)) btns+=`<button class="act-btn act-blue" onclick="markAsChecking(${i.id})">진행</button>`;
      btns+=`<button class="act-btn" onclick="openQuoteModal(${i.id})">견적</button>`;
    }
    let resHtml = '-';
    if(i.status==='견적완료') {
      const s = i.result==='수주'?'background:#EAF3DE;color:#27500A;border-color:#C0DD97;':i.result==='미수주'?'background:#FCEBEB;color:#791F1F;border-color:#F09595;':'';
      resHtml = `<button class="act-btn" onclick="openResultModalDirect(${i.id})" style="${s} font-weight:bold;">${i.result||'결과 입력'}</button>`;
    }
    return `<tr>
      <td><input type="checkbox" onchange="onRowCheck(${i.id},this.checked)"></td>
      <td style="font-size:11px;color:var(--text-secondary);">${i.date}</td>
      <td>${i.rep}</td>
      <td style="font-weight:500;min-width:70px;">${esc(i.customer)}</td>
      <td style="font-size:11px;color:var(--text-secondary);">${esc(i.partNo)}</td>
      <td style="font-size:12px;font-weight:500;min-width:110px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(i.product)}">${esc(i.product)}</td>
      <td style="font-size:11px;color:var(--text-secondary);">${esc(i.spec)||'-'}</td>
      <td style="font-size:11px;color:var(--text-secondary);">${esc(i.casNo)||'-'}</td>
      <td style="font-size:11px;">${esc(i.pkg)||'-'}</td>
      <td style="font-size:12px;">${esc(i.qty)||'-'}</td>
      <td style="font-size:12px;font-weight:500;">${formatPrice(i.price)}</td>
      <td style="font-size:12px;">${esc(i.delivery)||'-'}</td>
      <td>${badgeHtml(i.status)}</td>
      <td style="font-size:11px;color:var(--text-secondary);min-width:70px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(i.endUser)}">${esc(i.endUser)||'-'}</td>
      <td style="font-size:11px;min-width:110px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);" title="${esc(i.memo)}">${esc(i.memo)||'-'}</td>
      <td><div class="action-group">${btns}</div></td>
      <td style="text-align:center;">${resHtml}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="17" class="empty">항목 없음</td></tr>';
  
  const tp = Math.ceil(list.length/itemsPerPage)||1;
  document.getElementById('pagination').innerHTML = Array.from({length:Math.min(5,tp)}, (_,k) => {
    let p = Math.max(1, currentPage-2) + k; if(p>tp) p = tp - (4-k); if(p<1) return '';
    return `<button onclick="changePage(${p})" style="padding:4px 10px; border:1px solid var(--border); border-radius:4px; background:${p===currentPage?'var(--text-primary)':'#fff'}; color:${p===currentPage?'#fff':'#000'};">${p}</button>`;
  }).join('');
}

function openInqModal() { clearInqForm(); openModal('inq-modal'); setTimeout(()=>document.getElementById('i-customer').focus(),50); }
async function submitInquiry(keep) {
  if(isSubmitting) return; const rep=document.getElementById('i-rep').value, customer=document.getElementById('i-customer').value, prod=document.getElementById('i-product').value;
  if(!customer||!prod) return alert('고객사와 제품명 필수');
  isSubmitting = true;
  try {
    const endUser=document.getElementById('i-enduser').value, memo=document.getElementById('i-memo').value;
    const inq = { id:nextId++, date:new Date().toISOString().slice(0,10), rep, customer, endUser, partNo:document.getElementById('i-partno').value, product:prod, spec:document.getElementById('i-spec').value, casNo:document.getElementById('i-casno').value, pkg:document.getElementById('i-pkg').value, qty:document.getElementById('i-qty').value, status:'대기', memo, logs:[{date:nowStr(), type:'inquiry', author:`영업팀 (${rep})`, text:`최초 견적 문의`+(endUser?`\n엔드유저: ${endUser}`:'')+(memo?`\n메모: ${memo}`:'')}] };
    await db.collection("inquiries").doc(String(inq.id)).set(inq); syncToSheets(inq);
    await sendDiscord(CONFIG.discordBuyer, { title:'📋 새 견적 문의', color:0xBA7517, fields:[{name:'영업',value:rep,inline:true},{name:'고객사',value:customer,inline:true},{name:'제품',value:prod}], timestamp:new Date().toISOString() });
    if(keep) { clearInqForm(); document.getElementById('i-customer').focus(); } else closeModal('inq-modal');
  } catch(e) {} finally { isSubmitting = false; }
}

async function markAsChecking(id) {
  const i = inquiries.find(x=>x.id===id); if(!i) return;
  i.status = '확인 중'; i.logs = i.logs||[]; i.logs.push({ date:nowStr(), type:'quote', author:'구매팀', text:'👁️ 견적 확인 중' });
  await db.collection("inquiries").doc(String(id)).update({status:i.status, logs:i.logs});
}

function openQuoteModal(id) {
  quoteTarget = id; const i = inquiries.find(x=>x.id===id); if(!i) return;
  document.getElementById('q-price').value = i.price?i.price.toLocaleString():''; document.getElementById('q-delivery').value = i.delivery||''; document.getElementById('q-supplier').value = i.supplier||''; document.getElementById('q-status').value = i.status==='견적불가'?'견적불가':'견적완료'; document.getElementById('q-memo').value = '';
  openModal('quote-modal');
}

async function submitQuote() {
  if(isSubmitting) return; const i = inquiries.find(x=>x.id===quoteTarget); if(!i) return;
  isSubmitting = true;
  try {
    const p = parseInt(document.getElementById('q-price').value.replace(/,/g,''))||null, d=document.getElementById('q-delivery').value, s=document.getElementById('q-supplier').value, m=document.getElementById('q-memo').value, st=document.getElementById('q-status').value;
    i.price=p; i.delivery=d; i.supplier=s; i.status=st; if(m) i.memo=m;
    i.logs.push({date:nowStr(), type:'quote', author:'구매팀', text:st==='견적불가'?`🚫 불가사유: ${m}`:`✅ 견적완료 (₩${p?p.toLocaleString():'-'} / 납기: ${d})`});
    await db.collection("inquiries").doc(String(quoteTarget)).update(i);
    await sendDiscord(CONFIG.discordRep, { title:st==='견적불가'?'🚫 불가':'📨 완료', color:0x378ADD, fields:[{name:'영업',value:i.rep},{name:'고객사',value:i.customer},{name:'금액',value:p?p.toLocaleString():'-'}] });
    closeModal('quote-modal');
  } finally { isSubmitting = false; }
}

function openResultModalDirect(id) {
  resultTarget = id; const i = inquiries.find(x=>x.id===id); if(!i) return;
  document.getElementById('r-price').value = i.price?i.price.toLocaleString():''; document.getElementById('r-pkg').value = i.pkg||''; document.getElementById('r-qty').value = i.qty||''; document.getElementById('r-result').value = i.result||''; document.getElementById('r-memo').value = '';
  openModal('result-modal');
}

function getUserLabel() { return currentUserEmail==='ink@avention.co.kr'?'구매팀':`영업팀 (${currentUserEmail.split('@')[0]})`; }

async function submitResult() {
  if(isSubmitting) return; const i = inquiries.find(x=>x.id===resultTarget); if(!i) return;
  const res = document.getElementById('r-result').value; if(!res) return alert('결과 선택');
  const p = parseInt(document.getElementById('r-price').value.replace(/,/g,''))||i.price; if(isNaN(p)) return alert('금액 오류');
  isSubmitting = true;
  try {
    i.result=res; i.price=p; i.pkg=document.getElementById('r-pkg').value; i.qty=document.getElementById('r-qty').value;
    const m = document.getElementById('r-memo').value;
    i.logs.push({date:nowStr(), type:'result', author:getUserLabel(), text:(res==='수주'?`🏆 수주 (₩${p.toLocaleString()})`:`❌ 미수주`)+(m?`\n사유: ${m}`:'')});
    await db.collection("inquiries").doc(String(resultTarget)).update({result:i.result, price:i.price, pkg:i.pkg, qty:i.qty, logs:i.logs});
    closeModal('result-modal');
  } finally { isSubmitting = false; }
}

function openLogModal(id) {
  logTarget = id; const i = inquiries.find(x=>x.id===id); if(!i) return;
  document.getElementById('log-container').innerHTML = (i.logs||[]).map(l=>`<div style="margin-bottom:8px;border-bottom:1px solid #eee;"><b style="font-size:11px;">${l.author}</b> <span style="color:#999;font-size:10px;">${l.date}</span><div style="font-size:12px;margin:4px 0;">${esc(l.text)}</div></div>`).join('');
  document.getElementById('l-comment').value = ''; openModal('log-modal');
}

async function submitComment() {
  if(isSubmitting) return; const i = inquiries.find(x=>x.id===logTarget); const txt=document.getElementById('l-comment').value; if(!txt) return;
  isSubmitting = true;
  try {
    i.logs.push({date:nowStr(), type:'comment', author:getUserLabel(), text:txt});
    await db.collection("inquiries").doc(String(logTarget)).update({logs:i.logs});
    closeModal('log-modal');
  } finally { isSubmitting = false; }
}

function renderMetrics() { document.getElementById('metrics').innerHTML = `<div class="metric"><div class="metric-label">전체 견적 문의</div><div class="metric-value">${inquiries.length}건</div></div>`; }
function renderRepStats() {} function renderRecent() {} function renderTrend() {} function renderAnalytics() {} function renderNotifs() {} function updateBadges() {} function downloadExcel() {} function renderAll() { renderTable(); }
</script>
</body>
