<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어벤션 견적 수주율 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
  /* 🎨 image_9971eb.png 디자인 규격 100% 복원 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeece6; --bg-info: #e6f1fb;
    --text-primary: #1a1a18; --text-secondary: #6b6b67; --text-tertiary: #a0a09a; --text-info: #0c447c;
    --border: rgba(0,0,0,0.12); --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px; --radius-lg: 12px;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }

  /* 🔒 로그인 화면 */
  #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; z-index: 5000; }
  .login-card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2.5rem 2rem; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
  .google-btn { width: 100%; padding: 12px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: var(--bg-primary); cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-primary); }

  #main-app { display: none; }
  #main-app.show { display: block; }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }

  /* Header */
  .header { padding: 1.5rem 2rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header-left h1 { font-size: 20px; font-weight: 600; }
  .header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  /* Tabs */
  .tab-bar { display: flex; padding: 0 2rem; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 14px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 600; }

  .content { padding: 2rem; display: none; }
  .content.active { display: block; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 2rem; }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1.5rem; }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .metric-value { font-size: 24px; font-weight: 700; }
  .green { color: #1D9E75; } .amber { color: #BA7517; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.5rem; }
  .card-pad { padding: 1.5rem; }
  .section-title { font-size: 14px; font-weight: 600; margin-bottom: 15px; }

  /* Rep Row gauges */
  .rep-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .rep-info { flex: 1; }
  .rep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .prog { width: 100%; height: 6px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: #1D9E75; }

  /* Recent List */
  .recent-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .b-wait { background: #FAEEDA; color: #633806; } .b-won { background: #EAF3DE; color: #27500A; } .b-lost { background: #FCEBEB; color: #791F1F; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-secondary); background: #f9f9f9; border-bottom: 1px solid var(--border); }
  td { padding: 14px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }

  /* Buttons */
  .btn { padding: 8px 16px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 13px; transition: 0.2s; }
  .btn-primary { background: #1a1a18; color: white; border: none; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* Notif */
  .notif-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
  .notif-item.unread { background: var(--bg-info); }
  .dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-right: 8px; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 4000; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-primary); border-radius: var(--radius-lg); width: 100%; max-width: 520px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="margin-bottom:10px;">어벤션 견적 관리</h1>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">회사 계정(@avention.co.kr)으로 로그인하세요.</p>
    <button class="google-btn" onclick="loginWithGoogle()">Google 로그인</button>
  </div>
</div>

<div id="main-app" class="app">
  <div class="shell">
    <div class="header">
      <div class="header-left"><h1>견적 수주율 관리 대시보드</h1><p id="user-info">김소유 소유님 접속 중</p></div>
      <div style="display:flex;gap:12px;align-items:center;">
        <span id="pending-badge" style="display:none;font-size:12px;color:#854F0B;background:#FAEEDA;padding:6px 12px;border-radius:20px;font-weight:600;"></span>
        <button class="btn btn-primary" onclick="openModal('inq-modal')">+ 견적 문의 등록</button>
        <button class="btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
      <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
      <div class="tab" onclick="switchTab('notifications',this)">알림 <span id="notif-dot"></span></div>
      <div class="tab" onclick="switchTab('analytics',this)">분석</div>
    </div>

    <div id="tab-dashboard" class="content active">
      <div class="metrics" id="metrics"></div>
      <div class="two-col">
        <div class="card card-pad"><div class="section-title">영업담당자별 수주율</div><div id="rep-stats"></div></div>
        <div class="card card-pad"><div class="section-title">최근 견적 현황</div><div id="recent-list"></div></div>
      </div>
      <div class="section-title" style="margin-top:1rem;">월별 수주율 추이</div>
      <div class="card card-pad"><div style="height:220px;"><canvas id="trend-chart"></canvas></div></div>
    </div>

    <div id="tab-inquiries" class="content">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <div style="display:flex; gap:10px;">
          <select id="f-rep" onchange="renderTable()" class="btn"><option value="">전체 담당자</option><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select>
          <select id="f-status" onchange="renderTable()" class="btn"><option value="">전체 상태</option><option>대기중</option><option>견적완료</option><option>수주</option><option>미수주</option></select>
        </div>
        <button class="btn" style="color:#1D9E75; border-color:#1D9E75;" onclick="exportExcel()">Excel 다운로드</button>
      </div>
      <div class="card table-wrap">
        <table>
          <thead><tr><th>날짜</th><th>담당자</th><th>고객사</th><th>Cat No.</th><th>제품명</th><th>CAS No.</th><th>Package</th><th>수량</th><th>금액</th><th>상태</th><th>액션</th></tr></thead>
          <tbody id="inq-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-notifications" class="content">
      <div class="section-title">실시간 업무 알림</div>
      <div class="card" id="notif-list"></div>
    </div>

    <div id="tab-analytics" class="content">
      <div class="two-col">
        <div class="card card-pad"><div class="section-title">담당자별 수주 건수</div><div style="height:240px;"><canvas id="rep-chart"></canvas></div></div>
        <div class="card card-pad"><div class="section-title">전체 결과 현황</div><div style="height:240px;"><canvas id="result-chart"></canvas></div></div>
      </div>
      <div class="card card-pad"><div class="section-title">담당자별 수주율 비교</div><div style="height:220px;"><canvas id="rate-chart"></canvas></div></div>
    </div>
  </div>
</div>

<div class="overlay" id="inq-modal">
  <div class="modal">
    <div style="padding:1.5rem; border-bottom:0.5px solid var(--border); display:flex; justify-content:space-between;">
      <h2 style="font-size:16px;">신규 견적 문의 등록</h2>
      <button class="btn" style="border:none;font-size:20px;" onclick="closeModal('inq-modal')">×</button>
    </div>
    <div style="padding:2rem;">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
        <div style="display:flex; flex-direction:column; gap:5px;"><label style="font-size:12px; font-weight:600;">영업담당자</label><select id="i-rep" style="padding:10px; border:0.5px solid var(--border); border-radius:var(--radius-md);"><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select></div>
        <div style="display:flex; flex-direction:column; gap:5px;"><label style="font-size:12px; font-weight:600;">고객사</label><input id="i-customer" type="text" placeholder="고객사명" style="padding:10px; border:0.5px solid var(--border); border-radius:var(--radius-md);"></div>
        <div style="display:flex; flex-direction:column; gap:5px;"><label style="font-size:12px; font-weight:600;">Cat No.</label><input id="i-partno" type="text" style="padding:10px; border:0.5px solid var(--border); border-radius:var(--radius-md);"></div>
        <div style="display:flex; flex-direction:column; gap:5px;"><label style="font-size:12px; font-weight:600;">제품명</label><input id="i-product" type="text" style="padding:10px; border:0.5px solid var(--border); border-radius:var(--radius-md);"></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:5px;"><label style="font-size:12px; font-weight:600;">메모</label><textarea id="i-memo" rows="3" style="padding:10px; border:0.5px solid var(--border); border-radius:var(--radius-md);"></textarea></div>
    </div>
    <div style="padding:1.5rem; border-top:0.5px solid var(--border); text-align:right;">
      <button class="btn" onclick="closeModal('inq-modal')" style="margin-right:10px;">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry()">등록 완료</button>
    </div>
  </div>
</div>

<script>
// ── Firebase & Config ──────────────────────────
const firebaseConfig = { apiKey: "AIzaSyDXolC9bL4pdBAcLTHC2tsEAmKkCilYAVw", authDomain: "avention-quote.firebaseapp.com", projectId: "avention-quote", storageBucket: "avention-quote.firebasestorage.app", messagingSenderId: "963602798000", appId: "1:963602798000:web:b9f126a5c44270c4c0b275" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(), auth = firebase.auth();

let inquiries = [], notifs = [];
const REPS = ['BML', 'LSB', 'POL', 'YSJ'], AV_COLORS = ['#B5D4F4', '#9FE1CB', '#F5C4B3', '#CECBF6'], charts = {};
const STATUS_BADGE = { '대기중':'b-wait', '견적완료':'b-quoted', '수주':'b-won', '미수주':'b-lost' };

// 🔒 보안 및 계정 연동
auth.onAuthStateChanged(user => {
  if (user && (user.email.endsWith('@avention.co.kr') || user.email === 'ink@avention.co.kr')) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').classList.add('show');
    document.getElementById('user-info').textContent = `${user.displayName || user.email} 소유님 접속 중`;
    startSync();
  } else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('main-app').classList.remove('show'); if(user) auth.signOut(); }
});
function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout() { if(confirm('로그아웃 하시겠습니까?')) auth.signOut(); }

// 🎆 실시간 연동
function startSync() {
  db.collection("inquiries").orderBy("id", "desc").onSnapshot(snap => { inquiries = snap.docs.map(doc => doc.data()); renderAll(); });
  db.collection("notifs").orderBy("id", "desc").limit(30).onSnapshot(snap => { notifs = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() })); renderNotifs(); updateBadges(); });
}

// ── Rendering (디자인 보존 100%)
function renderAll() {
  renderMetrics(); renderRepStats(); renderRecent(); renderTable();
  if(document.getElementById('tab-dashboard').classList.contains('active')) setTimeout(renderTrend, 100);
}

function renderMetrics() {
  const won = inquiries.filter(i => i.status === '수주').length, pending = inquiries.filter(i => i.status === '대기중').length;
  const decided = won + inquiries.filter(i=>i.status==='미수주').length, rate = decided > 0 ? Math.round(won/decided*100) : 0;
  const totalAmt = inquiries.filter(i=>i.status==='수주').reduce((s,i)=>s+(i.price||0), 0);
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">전체 견적 문의</div><div class="metric-value">${inquiries.length}건</div></div>
    <div class="metric"><div class="metric-label">수주율</div><div class="metric-value green">${rate}%</div></div>
    <div class="metric"><div class="metric-label">처리 대기</div><div class="metric-value amber">${pending}건</div></div>
    <div class="metric"><div class="metric-label">수주 총액</div><div class="metric-value">${(totalAmt/1000000).toFixed(1)}M</div></div>`;
}

function renderRepStats() {
  document.getElementById('rep-stats').innerHTML = REPS.map((rep, i) => {
    const mine = inquiries.filter(x=>x.rep===rep), won = mine.filter(x=>x.status==='수주').length;
    const rate = (won + mine.filter(x=>x.status==='미수주').length) > 0 ? Math.round(won/(won + mine.filter(x=>x.status==='미수주').length)*100) : 0;
    return `<div class="rep-row">
      <div class="avatar" style="background:${AV_COLORS[i]}">${rep[0]}</div>
      <div class="rep-info">
        <div class="rep-header"><span><strong>${rep}</strong> 문의 ${mine.length}</span><span>${rate}%</span></div>
        <div class="prog"><div class="prog-fill" style="width:${rate}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function renderRecent() {
  document.getElementById('recent-list').innerHTML = inquiries.slice(0, 6).map(i => `
    <div class="recent-item"><span class="badge ${STATUS_BADGE[i.status]}">${i.status}</span><span style="margin-left:8px; flex:1;"><strong>${i.customer}</strong> - ${i.product}</span></div>
  `).join('') || '<div style="text-align:center; padding:20px; color:#999;">데이터 없음</div>';
}

function renderTable() {
  const r = document.getElementById('f-rep').value, s = document.getElementById('f-status').value;
  const list = inquiries.filter(i => (!r || i.rep === r) && (!s || i.status === s));
  document.getElementById('inq-tbody').innerHTML = list.map(i => `
    <tr><td>${i.date}</td><td>${i.rep}</td><td><strong>${i.customer}</strong></td><td>${i.partNo||'-'}</td><td>${i.product||'-'}</td><td>${i.casNo||'-'}</td><td>${i.pkg||'-'}</td><td>${i.qty||'-'}</td><td>${i.price?'₩'+(i.price/10000).toFixed(0)+'만':'-'}</td><td><span class="badge ${STATUS_BADGE[i.status]}">${i.status}</span></td><td><button class="btn btn-sm" onclick="deleteInq(${i.id})" style="color:red; border:none;">삭제</button></td></tr>
  `).join('');
}

// 🛡️ 알림 삭제 및 시간 표시 (소유님 전용)
function renderNotifs() {
  const el = document.getElementById('notif-list'), isMaster = auth.currentUser && auth.currentUser.email === 'ink@avention.co.kr';
  el.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <div><div style="font-size:14px;">${n.unread?'<span class="dot"></span>':''}<span>${n.text}</span> <span style="font-size:10px; background:#FAECE7; color:#712B13; padding:2px 6px; border-radius:10px;">알림</span></div><div style="font-size:11px; color:#aaa; margin-top:6px;">${n.time}</div></div>
      ${isMaster ? `<button class="btn btn-sm" style="color:#E24B4A; font-weight:600; border:1px solid #f09595;" onclick="deleteNotif('${n.docId}')">삭제</button>` : ''}
    </div>`).join('') || '<div style="padding:2rem; text-align:center;">알림 없음</div>';
}
async function deleteNotif(id) { if(confirm("알림을 삭제할까요?")) await db.collection("notifs").doc(id).delete(); }

// 🛡️ 시간 표시 (slice 제거)
function nowStr() { return new Date().toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:true }).replace(/\. /g, '-').replace('.', ''); }

function switchTab(name, el) { 
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); 
  el.classList.add('active'); document.getElementById('tab-'+name).classList.add('active'); 
  if(name==='dashboard') setTimeout(renderTrend, 100); 
  if(name==='analytics') setTimeout(renderAnalytics, 100); 
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
async function submitInquiry() {
  const rep = document.getElementById('i-rep').value, customer = document.getElementById('i-customer').value.trim();
  if(!customer) return alert("고객사를 입력하세요.");
  const inq = { id: Date.now(), date: new Date().toISOString().slice(0,10), rep, customer, product: document.getElementById('i-product').value.trim(), partNo: document.getElementById('i-partno').value.trim(), status: '대기중', price: null };
  await db.collection("inquiries").doc(String(inq.id)).set(inq);
  await db.collection("notifs").add({ id: Date.now(), text: `${rep}님이 ${customer} 견적 요청`, time: nowStr(), unread: true });
  closeModal('inq-modal');
}
async function deleteInq(id) { if(confirm("삭제하시겠습니까?")) await db.collection("inquiries").doc(String(id)).delete(); }

function renderTrend() {
  if(charts.trend) charts.trend.destroy();
  charts.trend = new Chart(document.getElementById('trend-chart'), { type:'line', data:{ labels:['1월','2월','3월','4월'], datasets:[{ label:'수주율', data:[45,52,48,60], borderColor:'#1D9E75', fill:true, backgroundColor:'rgba(29,158,117,0.05)', tension:0.4 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} } });
}

function renderAnalytics() {
  ['rep-chart','result-chart','rate-chart'].forEach(id=>{ if(charts[id]) charts[id].destroy(); });
  charts['rep-chart'] = new Chart(document.getElementById('rep-chart'), { type:'doughnut', data:{ labels:REPS, datasets:[{ data:REPS.map(r=>inquiries.filter(i=>i.rep===r&&i.status==='수주').length), backgroundColor:['#378ADD','#1D9E75','#D85A30','#7F77DD'] }] }, options:{responsive:true, maintainAspectRatio:false} });
  charts['result-chart'] = new Chart(document.getElementById('result-chart'), { type:'bar', data:{ labels:['수주','미수주','대기'], datasets:[{ data:[inquiries.filter(i=>i.status==='수주').length, inquiries.filter(i=>i.status==='미수주').length, inquiries.filter(i=>i.status==='대기중').length], backgroundColor:['#639922','#E24B4A','#BA7517'] }] }, options:{responsive:true, maintainAspectRatio:false} });
  charts['rate-chart'] = new Chart(document.getElementById('rate-chart'), { type:'bar', data:{ labels:REPS, datasets:[{ label:'수주율(%)', data:REPS.map(r=>{ const d=inquiries.filter(i=>i.rep===r&&['수주','미수주'].includes(i.status)); return d.length>0?Math.round(inquiries.filter(i=>i.rep===r&&i.status==='수주').length/d.length*100):0; }), backgroundColor:['#378ADD','#1D9E75','#D85A30','#7F77DD'] }] }, options:{indexAxis:'y', responsive:true, maintainAspectRatio:false} });
}

function updateBadges() { const pending = inquiries.filter(i=>i.status==='대기중').length, pn = document.getElementById('pending-badge'); if(pending > 0) { pn.style.display = 'inline-block'; pn.textContent = `미처리 ${pending}건`; } else pn.style.display = 'none'; }
function exportExcel() { const ws = XLSX.utils.json_to_sheet(inquiries); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "견적내역"); XLSX.writeFile(wb, `어벤션_견적_${new Date().toISOString().slice(0,10)}.xlsx`); }
</script>
</body>
</html>
