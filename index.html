<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어벤션 견적 관리 대시보드</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeece6;
    --text-primary: #1a1a18; --text-secondary: #6b6b67; --border: rgba(0,0,0,0.12);
    --radius-md: 8px; --radius-lg: 12px; --font: 'Pretendard', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }

  /* 로그인 화면 */
  #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-card { background: white; padding: 2.5rem; border-radius: var(--radius-lg); text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 90%; max-width: 400px; }
  .login-card h1 { font-size: 20px; margin-bottom: 8px; }
  .login-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
  .google-btn { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .google-btn:hover { background: #f9f9f9; }

  /* 메인 앱 (로그인 전 숨김) */
  #main-app { display: none; max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  #main-app.show { display: block; }

  .shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  .header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .tab-bar { display: flex; padding: 0 1.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 600; }
  
  .content { padding: 1.5rem; display: none; }
  .content.active { display: block; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--bg-secondary); padding: 1rem; border-radius: var(--radius-md); }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
  .metric-value { font-size: 20px; font-weight: 600; }

  .btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; font-size: 12px; background: white; }
  .btn-primary { background: #1a1a18; color: white; border-color: #1a1a18; }
  
  .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-md); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px; background: var(--bg-secondary); text-align: left; font-size: 11px; color: var(--text-secondary); }
  td { padding: 10px; border-bottom: 1px solid var(--border); }

  /* 모달 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: var(--radius-lg); width: 90%; max-width: 500px; padding: 1.5rem; }
  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .fg label { font-size: 11px; font-weight: 600; }
  .fg input, .fg select, .fg textarea { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
  .fg textarea { min-height: 80px; resize: vertical; }
  
  .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; }
  .b-wait { background: #FAEEDA; color: #633806; }
  .dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-left: 5px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>어벤션 견적 관리</h1>
    <p>사내 직원 전용 시스템입니다.<br>회사 구글 계정으로 로그인해주세요.</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
      Google 계정으로 로그인
    </button>
  </div>
</div>

<div id="main-app">
  <div class="shell">
    <div class="header">
      <div>
        <h1 style="font-size:18px;">견적 수주율 대시보드</h1>
        <p id="user-info" style="font-size:11px; color:var(--text-secondary);"></p>
      </div>
      <button class="btn" onclick="logout()">로그아웃</button>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
      <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
    </div>

    <div id="tab-dashboard" class="content active">
      <div class="metrics" id="metrics-grid"></div>
      <button class="btn btn-primary" onclick="openModal('inq-modal')">+ 신규 견적 문의 등록</button>
    </div>

    <div id="tab-inquiries" class="content">
      <div class="filter-bar">
        <span style="font-size:13px; font-weight:600;">견적 내역</span>
        <span style="flex:1;"></span>
        <button class="btn" style="color:#1D9E75; border-color:#1D9E75;" onclick="exportExcel()">엑셀 다운로드</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>문의일</th><th>담당자</th><th>고객사</th><th>제품명</th><th>상태</th><th>액션</th></tr>
          </thead>
          <tbody id="inq-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="inq-modal">
  <div class="modal">
    <h2 style="font-size:16px; margin-bottom:15px;">신규 견적 문의 등록</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <div class="fg"><label>영업담당자</label><select id="i-rep"><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select></div>
      <div class="fg"><label>고객사</label><input id="i-customer" type="text" placeholder="고객사명"></div>
    </div>
    <div class="fg"><label>제품명</label><input id="i-product" type="text" placeholder="제품명 입력"></div>
    <div class="fg"><label>메모 (요청사항)</label><textarea id="i-memo" placeholder="추가 전달 사항을 입력하세요."></textarea></div>
    <div style="text-align:right; margin-top:15px;">
      <button class="btn" onclick="closeModal('inq-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry()">등록 + 알림 전송</button>
    </div>
  </div>
</div>

<script>
// ── 파이어베이스 설정 ──────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDXolC9bL4pdBAcLTHC2tsEAmKkCilYAVw",
  authDomain: "avention-quote.firebaseapp.com",
  projectId: "avention-quote",
  storageBucket: "avention-quote.firebasestorage.app",
  messagingSenderId: "963602798000",
  appId: "1:963602798000:web:b9f126a5c44270c4c0b275"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let inquiries = [];

// 🔒 [소유님 요청] 로그인 감지 및 권한 체크 로직
auth.onAuthStateChanged((user) => {
  if (user) {
    const isAventionStaff = user.email.endsWith('@avention.co.kr');
    const isMaster = user.email === 'ink@avention.co.kr';

    if (isAventionStaff || isMaster) {
      // 성공: 화면 전환 및 데이터 시작
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-app').classList.add('show');
      document.getElementById('user-info').textContent = `${user.displayName}님 접속 중`;
      startListening(); 
    } else {
      // 실패: 경고 및 로그아웃
      alert("접근 권한이 없습니다. 어벤션 회사 계정으로 로그인해주세요.");
      auth.signOut();
    }
  } else {
    // 로그아웃 상태
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').classList.remove('show');
  }
});

function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => alert("로그인 실패: " + err.message));
}

function logout() { auth.signOut(); }

// ── 데이터 연동 (실시간) ──────────────────────────────
function startListening() {
  db.collection("inquiries").orderBy("id", "desc").onSnapshot((snapshot) => {
    inquiries = [];
    snapshot.forEach((doc) => inquiries.push(doc.data()));
    renderAll();
  });
}

async function submitInquiry() {
  const customer = document.getElementById('i-customer').value.trim();
  const product = document.getElementById('i-product').value.trim();
  if(!customer || !product) return alert("고객사와 제품명을 입력하세요.");

  const inq = {
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    rep: document.getElementById('i-rep').value,
    customer,
    product,
    memo: document.getElementById('i-memo').value.trim(),
    status: '대기중',
    price: null
  };

  try {
    await db.collection("inquiries").doc(String(inq.id)).set(inq);
    closeModal('inq-modal');
  } catch(e) { alert("저장 실패: " + e.message); }
}

async function deleteInquiry(id) {
  if(!confirm("정말 삭제하시겠습니까?")) return;
  await db.collection("inquiries").doc(String(id)).delete();
}

// ── 화면 렌더링 ──────────────────────────────────────
function renderAll() {
  // 메트릭 업데이트
  const total = inquiries.length;
  const pending = inquiries.filter(i => i.status === '대기중').length;
  const won = inquiries.filter(i => i.status === '수주').length;
  
  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric"><div class="metric-label">전체 견적</div><div class="metric-value">${total}건</div></div>
    <div class="metric"><div class="metric-label">대기중</div><div class="metric-value" style="color:#BA7517">${pending}건</div></div>
    <div class="metric"><div class="metric-label">수주성공</div><div class="metric-value" style="color:#3B6D11">${won}건</div></div>
    <div class="metric"><div class="metric-label">수주율</div><div class="metric-value">${total > 0 ? Math.round(won/total*100) : 0}%</div></div>
  `;

  // 목록 업데이트
  document.getElementById('inq-tbody').innerHTML = inquiries.map(i => `
    <tr>
      <td>${i.date}</td>
      <td>${i.rep}</td>
      <td><strong>${i.customer}</strong></td>
      <td>${i.product}</td>
      <td><span class="badge ${i.status === '대기중' ? 'b-wait' : ''}">${i.status}</span></td>
      <td><button class="btn" style="color:red; border:none;" onclick="deleteInquiry(${i.id})">삭제</button></td>
    </tr>
  `).join('');

  document.getElementById('pending-dot').innerHTML = pending > 0 ? `<span class="dot"></span>` : '';
}

// ── 유틸리티 ────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function exportExcel() {
  if(inquiries.length === 0) return alert("데이터가 없습니다.");
  const ws = XLSX.utils.json_to_sheet(inquiries);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "견적내역");
  XLSX.writeFile(wb, `어벤션_견적관리_${new Date().toISOString().slice(0,10)}.xlsx`);
}
</script>
</body>
</html>
