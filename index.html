<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어벤션 견적 수주율 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeece6; --bg-info: #e6f1fb;
  --text-primary: #1a1a18; --text-secondary: #6b6b67; --text-tertiary: #a0a09a; --text-info: #0c447c;
  --border: rgba(0,0,0,0.12); --border-hover: rgba(0,0,0,0.25);
  --radius-md: 8px; --radius-lg: 12px;
  --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b; --bg-info: #0c2440;
    --text-primary: #f0ede6; --text-secondary: #a0a09a; --text-tertiary: #6b6b67; --text-info: #85b7eb;
    --border: rgba(255,255,255,0.12); --border-hover: rgba(255,255,255,0.25);
  }
}
body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }

/* 로그인 */
#login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; z-index: 3000; }
.login-card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2.5rem 2rem; text-align: center; width: 90%; max-width: 380px; }
.login-logo { width: 48px; height: 48px; background: var(--bg-secondary); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
.login-card h1 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.login-card p { font-size: 12px; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.6; }
.google-btn { width: 100%; padding: 10px 16px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: var(--bg-primary); cursor: pointer; font-size: 13px; color: var(--text-primary); font-family: var(--font); display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s; }
.google-btn:hover { background: var(--bg-secondary); }

/* 메인 */
#main-app { display: none; }
#main-app.show { display: block; }
.app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
.shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
.header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.header-left h1 { font-size: 17px; font-weight: 600; }
.header-left p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.tab-bar { display: flex; padding: 0 1.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
.tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; transition: all 0.15s; }
.tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
.tab:hover:not(.active) { color: var(--text-primary); }
.content { padding: 1.5rem; display: none; }
.content.active { display: block; }

/* 메트릭 */
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
@media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
.metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
.metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
.metric-value { font-size: 22px; font-weight: 600; }
.metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
.green { color: #3B6D11; } .amber { color: #854F0B; }
@media (prefers-color-scheme: dark) { .green { color: #97C459; } .amber { color: #EF9F27; } }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
.card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
.card-pad { padding: 1rem; }
.section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }

/* 테이블 */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-secondary); }

/* 배지 */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.b-wait { background: #FAEEDA; color: #633806; }
.b-quoted { background: #E6F1FB; color: #0C447C; }
.b-won { background: #EAF3DE; color: #27500A; }
.b-lost { background: #FCEBEB; color: #791F1F; }

/* 버튼 */
.btn { padding: 7px 14px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-primary); font-family: var(--font); transition: background 0.15s; }
.btn:hover { background: var(--bg-secondary); }
.btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

.dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle; }

/* 모달 */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1rem; }
.overlay.open { display: flex; }
.modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
.modal-head { padding: 1.1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-head h2 { font-size: 15px; font-weight: 500; }
.modal-body { padding: 1.25rem 1.5rem; }
.modal-foot { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.x-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-secondary); line-height: 1; }

/* 폼 */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-full { grid-column: 1 / -1; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
.fg input, .fg select, .fg textarea { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 8px 10px; font-size: 13px; font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--border-hover); }
.fg textarea { resize: vertical; min-height: 65px; }

.filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.filter-bar select { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; font-size: 12px; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); }
.status-banner { background: var(--bg-info); border: 0.5px solid #b5d4f4; border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-info); margin-top: 10px; display: none; align-items: center; gap: 7px; }
.status-banner.show { display: flex; }

/* 담당자 */
.rep-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.rep-row:last-child { border-bottom: none; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.av-b { background: #B5D4F4; color: #0C447C; }
.av-t { background: #9FE1CB; color: #085041; }
.av-c { background: #F5C4B3; color: #712B13; }
.av-p { background: #CECBF6; color: #3C3489; }
.rep-name { font-size: 13px; font-weight: 500; min-width: 50px; }
.rep-meta { font-size: 11px; color: var(--text-secondary); flex: 1; display: flex; gap: 12px; }
.rep-meta b { color: var(--text-primary); }
.rate-wrap { min-width: 70px; text-align: right; }
.rate-num { font-size: 13px; font-weight: 600; }
.prog { width: 100%; height: 5px; background: var(--bg-secondary); border-radius: 3px; margin-top: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; background: #639922; }

.recent-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 0.5px solid var(--border); font-size: 12px; }
.recent-item:last-child { border-bottom: none; }
.notif-item { padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: var(--bg-info); }
.notif-text { font-size: 13px; display: flex; align-items: center; gap: 7px; }
.notif-time { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; padding-left: 13px; }
.noti-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 10px; background: #FAECE7; color: #712B13; }
.info-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.empty { padding: 2rem; text-align: center; color: var(--text-secondary); font-size: 13px; }
.chart-wrap { position: relative; width: 100%; }
.loading { display: flex; align-items: center; justify-content: center; padding: 3rem; gap: 10px; font-size: 13px; color: var(--text-secondary); }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--text-primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    </div>
    <h1>어벤션 견적 관리</h1>
    <p>어벤션 회사 계정(@avention.co.kr)으로<br>로그인해주세요.</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google 계정으로 로그인
    </button>
  </div>
</div>

<div id="main-app">
  <div class="app">
    <div class="shell">
      <div class="header">
        <div class="header-left">
          <h1>견적 수주율 관리 대시보드</h1>
          <p id="user-info">어벤션 견적 관리</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="pending-notif" style="display:none;font-size:12px;color:#854F0B;background:#FAEEDA;padding:5px 12px;border-radius:20px;"></span>
          <button class="btn btn-primary" onclick="openModal('inq-modal')">+ 견적 문의 등록</button>
          <button class="btn" onclick="logout()" style="font-size:11px;">로그아웃</button>
        </div>
      </div>
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
        <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
        <div class="tab" onclick="switchTab('notifications',this)">알림 <span id="notif-dot"></span></div>
        <div class="tab" onclick="switchTab('analytics',this)">분석</div>
      </div>

      <div id="tab-dashboard" class="content active">
        <div class="metrics" id="metrics"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
        <div class="two-col">
          <div>
            <div class="section-title">영업담당자별 수주율</div>
            <div class="card card-pad" id="rep-stats"></div>
          </div>
          <div>
            <div class="section-title">최근 견적 현황</div>
            <div class="card" id="recent-list"></div>
          </div>
        </div>
        <div class="section-title" style="margin-top:1rem;">월별 수주율 추이</div>
        <div class="card card-pad"><div class="chart-wrap" style="height:200px;"><canvas id="trend-chart"></canvas></div></div>
      </div>

      <div id="tab-inquiries" class="content">
        <div class="filter-bar">
          <select id="f-rep" onchange="renderTable()"><option value="">전체 담당자</option><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select>
          <select id="f-status" onchange="renderTable()"><option value="">전체 상태</option><option>대기중</option><option>견적완료</option><option>수주</option><option>미수주</option></select>
          <span style="flex:1;"></span>
          <button class="btn btn-sm" style="color:#1D9E75;border-color:#1D9E75;" onclick="exportExcel()">엑셀 다운로드</button>
          <span id="table-count" style="font-size:12px;color:var(--text-secondary);"></span>
        </div>
        <div class="card table-wrap">
          <table>
            <thead><tr><th>문의일</th><th>담당자</th><th>고객사</th><th>Cat No.</th><th>제품명</th><th>CAS No.</th><th>Package</th><th>수량</th><th>금액</th><th>상태</th><th>액션</th></tr></thead>
            <tbody id="inq-tbody"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-notifications" class="content">
        <div class="section-title">알림 내역</div>
        <div class="card" id="notif-list"></div>
      </div>

      <div id="tab-analytics" class="content">
        <div class="two-col">
          <div><div class="section-title">담당자별 수주 건수</div><div class="card card-pad"><div class="chart-wrap" style="height:220px;"><canvas id="rep-chart"></canvas></div></div></div>
          <div><div class="section-title">전체 결과 현황</div><div class="card card-pad"><div class="chart-wrap" style="height:220px;"><canvas id="result-chart"></canvas></div></div></div>
        </div>
        <div class="section-title">담당자별 수주율 비교</div>
        <div class="card card-pad"><div class="chart-wrap" style="height:200px;"><canvas id="rate-chart"></canvas></div></div>
      </div>
    </div>
  </div>
</div>

<!-- 견적 문의 등록 -->
<div class="overlay" id="inq-modal">
  <div class="modal">
    <div class="modal-head"><h2>신규 견적 문의 등록</h2><button class="x-btn" onclick="closeModal('inq-modal')">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg"><label>영업담당자</label><select id="i-rep"><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select></div>
        <div class="fg"><label>고객사</label><input id="i-customer" type="text" placeholder="고객사명"></div>
        <div class="fg"><label>Cat No.</label><input id="i-partno" type="text" placeholder="예: G7513"></div>
        <div class="fg"><label>제품명</label><input id="i-product" type="text" placeholder="제품명"></div>
        <div class="fg"><label>CAS No.</label><input id="i-casno" type="text" placeholder="예: 67-68-5"></div>
        <div class="fg"><label>Package</label><input id="i-pkg" type="text" placeholder="예: 500mL"></div>
        <div class="fg"><label>수량</label><input id="i-qty" type="text" placeholder="수량"></div>
        <div class="fg form-full"><label>메모 (구매팀 전달사항)</label><textarea id="i-memo" placeholder="상세 요청사항을 적어주세요."></textarea></div>
      </div>
      <div id="inq-status" class="status-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7L12 13 2 7"/></svg>
        <span id="inq-status-text"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('inq-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry()">등록 + 디스코드 알림</button>
    </div>
  </div>
</div>

<!-- 견적 입력 -->
<div class="overlay" id="quote-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 정보 입력</h2><button class="x-btn" onclick="closeModal('quote-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="quote-info"></div>
      <div class="form-grid">
        <div class="fg"><label>견적 금액 (원)</label><input id="q-price" type="number" placeholder="0"></div>
        <div class="fg"><label>납기 가능일</label><input id="q-delivery" type="date"></div>
        <div class="fg form-full"><label>공급사</label><input id="q-supplier" type="text" placeholder="공급사명"></div>
        <div class="fg form-full"><label>메모</label><textarea id="q-memo" placeholder="특이사항"></textarea></div>
      </div>
      <div id="quote-status" class="status-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7L12 13 2 7"/></svg>
        <span id="quote-status-text"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('quote-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitQuote()">견적 저장 + 영업팀 알림</button>
    </div>
  </div>
</div>

<!-- 수주 결과 확정 -->
<div class="overlay" id="result-modal">
  <div class="modal" style="max-width:380px;">
    <div class="modal-head"><h2>수주 결과 확정</h2><button class="x-btn" onclick="closeModal('result-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="result-info"></div>
      <div class="fg" style="margin-bottom:12px;"><label>수주 결과</label>
        <select id="r-result"><option value="수주">수주</option><option value="미수주">미수주</option></select>
      </div>
      <div class="fg"><label>메모 (선택)</label><textarea id="r-memo" placeholder="미수주 사유 등"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('result-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitResult()">저장</button>
    </div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDXolC9bL4pdBAcLTHC2tsEAmKkCilYAVw",
  authDomain: "avention-quote.firebaseapp.com",
  projectId: "avention-quote",
  storageBucket: "avention-quote.firebasestorage.app",

// 인증
auth.onAuthStateChanged(user => {
  if (user) {

      document.getElementById('login-screen').style.display = 'none';

// 실시간 동기화
function startSync() {
  db.collection('inquiries').orderBy('id','desc').onSnapshot(snap => {
    inquiries = snap.docs.map(d => d.data());
    renderAll();
  });
  db.collection('notifs').orderBy('id','desc').limit(30).onSnapshot(snap => {
    notifs = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
    renderNotifs(); updateBadges();
  });
}

// Discord
async function sendDiscord(url, embed) {
  try { await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({embeds:[embed]}) }); }
  catch(e) { console.error('Discord 오류:', e); }
}

// 구글 시트
async function syncToSheet(inq) {
  try { await fetch(CONFIG.sheetsUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(inq) }); }
  catch(e) { console.error('시트 오류:', e); }
}

// 견적 문의 등록
async function submitInquiry() {
  const rep = document.getElementById('i-rep').value;
  const customer = document.getElementById('i-customer').value.trim();
  const product = document.getElementById('i-product').value.trim();
  if (!customer || !product) return alert('고객사와 제품명을 입력해주세요.');

  const inq = {
    id: Date.now(), date: new Date().toISOString().slice(0,10),
    rep, customer, product,
    partNo: document.getElementById('i-partno').value.trim(),
    casNo:  document.getElementById('i-casno').value.trim(),
    pkg:    document.getElementById('i-pkg').value.trim(),
    qty:    document.getElementById('i-qty').value.trim(),
    memo:   document.getElementById('i-memo').value.trim(),
    status: '대기중', price: null, supplier: '', delivery: '', quoteDate: null
  };

  const sb = document.getElementById('inq-status');
  const st = document.getElementById('inq-status-text');
  sb.classList.add('show'); st.textContent = '저장 중...';

  await db.collection('inquiries').doc(String(inq.id)).set(inq);
  await db.collection('notifs').add({ id: Date.now(), text: `${rep} → 구매: ${customer} / ${product}`, time: nowStr(), unread: true });

  await sendDiscord(CONFIG.discordBuyer, {
    title: '📋 새 견적 문의', color: 0xBA7517,
    fields: [
      { name: '영업담당자', value: rep, inline: true }, { name: '고객사', value: customer, inline: true },
      { name: '제품명', value: product, inline: false },
      { name: 'Cat No.', value: inq.partNo||'-', inline: true }, { name: 'CAS No.', value: inq.casNo||'-', inline: true },
      { name: 'Package', value: inq.pkg||'-', inline: true }, { name: '수량', value: inq.qty||'-', inline: true },
      { name: '메모', value: inq.memo||'-', inline: false },
    ],
    footer: { text: '어벤션 견적 대시보드' }, timestamp: new Date().toISOString()
  });

  await syncToSheet(inq);
  st.textContent = '등록 완료! 디스코드 알림 전송됨';
  setTimeout(() => closeModal('inq-modal'), 1400);
}

// 견적 입력
function openQuoteModal(id) {
  quoteTarget = id;
  const i = inquiries.find(x => x.id === id); if (!i) return;
  document.getElementById('quote-info').textContent = `${i.rep} · ${i.customer} · ${i.product} · Cat No.: ${i.partNo||'-'} · ${i.pkg||''} × ${i.qty||''}`;
  document.getElementById('q-price').value = i.price || '';
  document.getElementById('q-delivery').value = i.delivery || '';
  document.getElementById('q-supplier').value = i.supplier || '';
  document.getElementById('q-memo').value = i.memo || '';
  openModal('quote-modal');
}

async function submitQuote() {
  const i = inquiries.find(x => x.id === quoteTarget); if (!i) return;
  const updates = {
    price:     parseInt(document.getElementById('q-price').value) || null,
    delivery:  document.getElementById('q-delivery').value,
    supplier:  document.getElementById('q-supplier').value,
    memo:      document.getElementById('q-memo').value,
    status:    '견적완료',
    quoteDate: new Date().toISOString().slice(0,10)
  };

  const sb = document.getElementById('quote-status');
  const st = document.getElementById('quote-status-text');
  sb.classList.add('show'); st.textContent = '저장 중...';

  await db.collection('inquiries').doc(String(quoteTarget)).update(updates);
  await db.collection('notifs').add({ id: Date.now(), text: `구매 → ${i.rep}: ${i.customer} / ${i.product} 견적 완료`, time: nowStr(), unread: true });

  await sendDiscord(CONFIG.discordRep, {
    title: `📨 견적 완료 — ${i.rep}님 확인해주세요`, color: 0x378ADD,
    fields: [
      { name: '담당자', value: i.rep, inline: true }, { name: '고객사', value: i.customer, inline: true },
      { name: '제품명', value: i.product, inline: false },
      { name: '견적 금액', value: updates.price ? '₩'+updates.price.toLocaleString() : '-', inline: true },
      { name: '공급사', value: updates.supplier||'-', inline: true },
      { name: '납기 가능일', value: updates.delivery||'-', inline: true },
      { name: '메모', value: updates.memo||'-', inline: false },
    ],
    footer: { text: '수주 여부는 견적 목록 → 수주확정 버튼으로 업데이트해주세요' },
    timestamp: new Date().toISOString()
  });

  await syncToSheet({ ...i, ...updates });
  st.textContent = '저장 완료! 영업팀에 알림 전송됨';
  setTimeout(() => closeModal('quote-modal'), 1400);
}

// 수주 결과 확정
function openResultModal(id) {
  resultTarget = id;
  const i = inquiries.find(x => x.id === id); if (!i) return;
  document.getElementById('result-info').textContent = `${i.rep} · ${i.customer} · ${i.product} · ₩${i.price ? i.price.toLocaleString() : '-'}`;
  document.getElementById('r-result').value = '수주';
  document.getElementById('r-memo').value = '';
  openModal('result-modal');
}

async function submitResult() {
  const i = inquiries.find(x => x.id === resultTarget); if (!i) return;
  const newStatus = document.getElementById('r-result').value;
  const memo = document.getElementById('r-memo').value;

  await db.collection('inquiries').doc(String(resultTarget)).update({ status: newStatus, resultMemo: memo });
  await db.collection('notifs').add({ id: Date.now(), text: `수주확정 → ${i.rep}: ${i.customer} [${newStatus}]`, time: nowStr(), unread: true });

  const emoji = newStatus === '수주' ? '✅' : '❌';
  await sendDiscord(CONFIG.discordRep, {
    title: `${emoji} 수주 결과 확정 — ${i.rep}님`,
    color: newStatus === '수주' ? 0x639922 : 0xE24B4A,
    fields: [
      { name: '담당자', value: i.rep, inline: true }, { name: '결과', value: newStatus, inline: true },
      { name: '고객사', value: i.customer, inline: false },
      { name: '제품명', value: i.product, inline: true },
      { name: '금액', value: i.price ? '₩'+i.price.toLocaleString() : '-', inline: true },
      { name: '메모', value: memo||'-', inline: false },
    ],
    footer: { text: '어벤션 견적 대시보드' }, timestamp: new Date().toISOString()
  });

  await syncToSheet({ ...i, status: newStatus, resultMemo: memo });
  closeModal('result-modal');
}

// 삭제
async function deleteInq(id) {
  const i = inquiries.find(x => x.id === id); if (!i) return;
  if (!confirm(`[${i.customer}] ${i.product} 견적을 삭제하시겠습니까?`)) return;
  await db.collection('inquiries').doc(String(id)).delete();
}

// 렌더링
function renderAll() {
  renderMetrics(); renderRepStats(); renderRecent(); updateBadges();
  if (document.getElementById('tab-dashboard').classList.contains('active')) setTimeout(renderTrend, 80);
  if (document.getElementById('tab-inquiries').classList.contains('active')) renderTable();
}

function renderMetrics() {
  const won = inquiries.filter(i=>i.status==='수주').length;
  const lost = inquiries.filter(i=>i.status==='미수주').length;
  const pending = inquiries.filter(i=>i.status==='대기중').length;
  const decided = won + lost;
  const rate = decided > 0 ? Math.round(won/decided*100) : 0;
  const totalAmt = inquiries.filter(i=>i.status==='수주').reduce((s,i)=>s+(i.price||0),0);
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">전체 견적 문의</div><div class="metric-value">${inquiries.length}건</div><div class="metric-sub">누적</div></div>
    <div class="metric"><div class="metric-label">수주율</div><div class="metric-value green">${rate}%</div><div class="metric-sub">수주 ${won} / 결정 ${decided}건</div></div>
    <div class="metric"><div class="metric-label">대기중 (미견적)</div><div class="metric-value amber">${pending}건</div><div class="metric-sub">견적 입력 필요</div></div>
    <div class="metric"><div class="metric-label">수주 총액</div><div class="metric-value">${(totalAmt/1000000).toFixed(1)}M원</div><div class="metric-sub">누적</div></div>`;
}

function renderRepStats() {
  document.getElementById('rep-stats').innerHTML = REPS.map((rep,i) => {
    const mine = inquiries.filter(x=>x.rep===rep);
    const won = mine.filter(x=>x.status==='수주').length;
    const decided = won + mine.filter(x=>x.status==='미수주').length;
    const rate = decided>0?Math.round(won/decided*100):0;
    return `<div class="rep-row">
      <div class="avatar ${AV[i]}">${rep[0]}</div>
      <div class="rep-name">${rep}</div>
      <div class="rep-meta"><span>문의 <b>${mine.length}</b></span><span>수주 <b>${won}</b></span><span>미수주 <b>${mine.filter(x=>x.status==='미수주').length}</b></span></div>
      <div class="rate-wrap"><div class="rate-num">${rate}%</div><div class="prog"><div class="prog-fill" style="width:${rate}%"></div></div></div>
    </div>`;
  }).join('');
}

function renderRecent() {
  const list = inquiries.slice(0,6);
  document.getElementById('recent-list').innerHTML = list.length
    ? list.map(i=>`<div class="recent-item">
        <span class="badge ${STATUS_BADGE[i.status]||'b-wait'}">${i.status}</span>
        <span style="color:var(--text-secondary);min-width:35px;">${i.rep}</span>
        <span style="font-weight:500;flex:1;">${i.customer}</span>
        <span style="color:var(--text-secondary);font-size:11px;">${i.product.length>12?i.product.slice(0,12)+'…':i.product}</span>
      </div>`).join('')
    : '<div class="empty">데이터 없음</div>';
}

function renderTable() {
  const r = document.getElementById('f-rep').value;
  const s = document.getElementById('f-status').value;
  const list = inquiries.filter(i=>(!r||i.rep===r)&&(!s||i.status===s));
  document.getElementById('table-count').textContent = `총 ${list.length}건`;
  document.getElementById('inq-tbody').innerHTML = list.length ? list.map(i=>`
    <tr>
      <td style="font-size:11px;color:var(--text-secondary);white-space:nowrap;">${i.date}</td>
      <td>${i.rep}</td><td style="font-weight:500;">${i.customer}</td>
      <td style="font-size:11px;">${i.partNo||'-'}</td>
      <td style="font-size:12px;">${i.product.length>12?i.product.slice(0,12)+'…':i.product}</td>
      <td style="font-size:11px;color:var(--text-secondary);">${i.casNo||'-'}</td>
      <td style="font-size:11px;">${i.pkg||'-'}</td>
      <td style="font-size:12px;">${i.qty||'-'}</td>
      <td style="font-size:12px;">${i.price?'₩'+(i.price/10000).toFixed(0)+'만':'-'}</td>
      <td><span class="badge ${STATUS_BADGE[i.status]||'b-wait'}">${i.status}</span></td>
      <td style="display:flex;gap:5px;flex-wrap:wrap;">
        <button class="btn btn-sm ${i.status==='대기중'?'btn-primary':''}" onclick="openQuoteModal(${i.id})">${i.status==='대기중'?'견적입력':'수정'}</button>
        ${i.status==='견적완료'?`<button class="btn btn-sm" style="color:#27500A;border-color:#C0DD97;" onclick="openResultModal(${i.id})">수주확정</button>`:''}
        <button class="btn btn-sm" style="color:#E24B4A;border-color:#F09595;" onclick="deleteInq(${i.id})">삭제</button>
      </td>
    </tr>`).join('')
    : '<tr><td colspan="11" class="empty">해당하는 항목 없음</td></tr>';
}

function renderNotifs() {
  const el = document.getElementById('notif-list');
  if (!notifs.length) { el.innerHTML='<div class="empty">알림 없음</div>'; return; }
  el.innerHTML = notifs.map(n=>`
    <div class="notif-item${n.unread?' unread':''}">
      <div class="notif-text">
        ${n.unread?'<span class="dot"></span>':'<span style="width:6px;display:inline-block;"></span>'}
        <span>${n.text}</span><span class="noti-badge">알림</span>
      </div>
      <div class="notif-time">${n.time}</div>
    </div>`).join('');
}

function updateBadges() {
  const pending = inquiries.filter(i=>i.status==='대기중').length;
  const unread = notifs.filter(n=>n.unread).length;
  document.getElementById('pending-dot').innerHTML = pending>0?'<span class="dot"></span>':'';
  document.getElementById('notif-dot').innerHTML = unread>0?'<span class="dot"></span>':'';
  const pn = document.getElementById('pending-notif');
  if(pending>0){pn.style.display='inline-block';pn.textContent=`미처리 ${pending}건`;}
  else pn.style.display='none';
}

function renderTrend() {
  if(charts.trend) charts.trend.destroy();
  const now = new Date();
  const last6 = Array.from({length:6},(_,i)=>{ const d=new Date(now.getFullYear(),now.getMonth()-5+i,1); return {label:(d.getMonth()+1)+'월',mo:String(d.getMonth()+1).padStart(2,'0'),yr:d.getFullYear()}; });
  const data = last6.map(({mo,yr})=>{
    const dec=inquiries.filter(i=>i.quoteDate&&i.quoteDate.startsWith(`${yr}-${mo}`)&&['수주','미수주'].includes(i.status));
    const w=dec.filter(i=>i.status==='수주').length;
    return dec.length>0?Math.round(w/dec.length*100):null;
  });
  charts.trend = new Chart(document.getElementById('trend-chart'),{
    type:'line', data:{labels:last6.map(x=>x.label),datasets:[{label:'수주율',data,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.07)',tension:0.4,fill:true,pointRadius:5,pointBackgroundColor:'#1D9E75',spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });
}

function renderAnalytics() {
  ['rep-chart','result-chart','rate-chart'].forEach(id=>{if(charts[id])charts[id].destroy();});
  charts['rep-chart']=new Chart(document.getElementById('rep-chart'),{
    type:'doughnut',data:{labels:REPS,datasets:[{data:REPS.map(r=>inquiries.filter(i=>i.rep===r&&i.status==='수주').length),backgroundColor:['#378ADD','#1D9E75','#D85A30','#7F77DD']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
  });
  const won=inquiries.filter(i=>i.status==='수주').length, lost=inquiries.filter(i=>i.status==='미수주').length;
  const quoted=inquiries.filter(i=>i.status==='견적완료').length, wait=inquiries.filter(i=>i.status==='대기중').length;
  charts['result-chart']=new Chart(document.getElementById('result-chart'),{
    type:'bar',data:{labels:['수주','미수주','견적완료','대기중'],datasets:[{data:[won,lost,quoted,wait],backgroundColor:['#639922','#E24B4A','#378ADD','#BA7517']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
  const rates=REPS.map(r=>{const dec=inquiries.filter(i=>i.rep===r&&['수주','미수주'].includes(i.status));const w=inquiries.filter(i=>i.rep===r&&i.status==='수주').length;return dec.length>0?Math.round(w/dec.length*100):0;});
  charts['rate-chart']=new Chart(document.getElementById('rate-chart'),{
    type:'bar',data:{labels:REPS,datasets:[{label:'수주율(%)',data:rates,backgroundColor:['#378ADD','#1D9E75','#D85A30','#7F77DD']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });
}

function exportExcel() {
  const data = inquiries.map(i=>({'문의일':i.date,'담당자':i.rep,'고객사':i.customer,'Cat No.':i.partNo||'','제품명':i.product,'CAS No.':i.casNo||'','Package':i.pkg||'','수량':i.qty||'','상태':i.status,'금액':i.price||'','공급사':i.supplier||'','납기일':i.delivery||'','메모':i.memo||'','견적일':i.quoteDate||''}));
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'견적내역');
  XLSX.writeFile(wb,`어벤션_견적_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function switchTab(name,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); document.getElementById('tab-'+name).classList.add('active');
  if(name==='inquiries') renderTable();
  if(name==='notifications'){notifs.forEach(n=>n.unread=false);renderNotifs();updateBadges();}
  if(name==='analytics') setTimeout(renderAnalytics,60);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  ['inq-status','quote-status'].forEach(sid=>{const el=document.getElementById(sid);if(el)el.classList.remove('show');});
}
function nowStr() {
  return new Date().toLocaleString('ko-KR', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  }).replace(/\. /g, '-').replace('.', '');
}
