<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어벤션 견적 수주율 관리 시스템</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
  /* 🎨 기본 스타일 및 디자인 유지 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeece6; --bg-info: #e6f1fb;
    --text-primary: #1a1a18; --text-secondary: #6b6b67; --text-tertiary: #a0a09a;
    --border: rgba(0,0,0,0.12); --radius-md: 8px; --radius-lg: 12px; --font: 'Pretendard', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }

  /* 🔒 로그인 화면 디자인 */
  #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; z-index: 3000; }
  .login-card { background: white; padding: 2.5rem; border-radius: var(--radius-lg); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 420px; }
  .login-card h1 { font-size: 20px; margin-bottom: 10px; }
  .login-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
  .google-btn { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; }
  .google-btn:hover { background: #f9f9f9; }

  /* 📱 메인 앱 본체 레이아웃 */
  #main-app { display: none; }
  #main-app.show { display: block; }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }

  /* UI 구성 요소들 (기존 스타일 그대로 계승) */
  .header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .tab-bar { display: flex; gap: 0; padding: 0 1.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .content { padding: 1.5rem; display: none; }
  .content.active { display: block; }

  /* 통계 카드 및 그래프 그리드 */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .green { color: #3B6D11; } .amber { color: #854F0B; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .card-pad { padding: 1rem; }
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }

  /* 테이블 디테일 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .b-wait { background: #FAEEDA; color: #633806; }
  .b-won { background: #EAF3DE; color: #27500A; }
  .b-lost { background: #FCEBEB; color: #791F1F; }

  .btn { padding: 7px 14px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn-primary { background: #1a1a18; color: white; border-color: #1a1a18; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* 담당자 아바타 바 */
  .rep-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; background: #CECBF6; color: #3C3489; }
  .prog { width: 100%; height: 5px; background: var(--bg-secondary); border-radius: 3px; margin-top: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: #639922; }

  /* 알림/뱃지 */
  .dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-left: 5px; }
  .notif-item { padding: 10px 14px; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .notif-item.unread { background: var(--bg-info); }
  .gmail-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 10px; background: #FAECE7; color: #712B13; }

  /* 모달 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-primary); border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 1.1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-foot { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .fg label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .fg input, .fg select, .fg textarea { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 8px 10px; font-size: 13px; font-family: inherit; }
  .status-banner { background: var(--bg-info); border: 0.5px solid #b5d4f4; border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-info); margin-top: 10px; display: none; align-items: center; gap: 7px; }
  .status-banner.show { display: flex; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="40" style="margin-bottom:15px;">
    <h1>어벤션 견적 관리</h1>
    <p>보안을 위해 회사 계정(@avention.co.kr)으로<br>로그인해 주시기 바랍니다.</p>
    <button class="google-btn" onclick="loginWithGoogle()">Google 계정으로 로그인</button>
  </div>
</div>

<div id="main-app" class="app">
  <div class="shell">
    
    <div class="header">
      <div class="header-left">
        <h1>견적 수주율 관리 대시보드</h1>
        <p id="user-info">어벤션 견적 관리 시스템</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="pending-notif" style="display:none;font-size:12px;color:#854F0B;background:#FAEEDA;padding:5px 12px;border-radius:20px;"></span>
        <button class="btn btn-primary" onclick="openModal('inq-modal')">+ 견적 문의 등록</button>
        <button class="btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
      <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
      <div class="tab" onclick="switchTab('notifications',this)">알림 <span id="notif-dot"></span></div>
      <div class="tab" onclick="switchTab('analytics',this)">분석</div>
    </div>

    <div id="tab-dashboard" class="content active">
      <div class="metrics" id="metrics"></div>
      <div class="two-col">
        <div>
          <div class="section-title">영업담당자별 수주율</div>
          <div class="card card-pad" id="rep-stats"></div>
        </div>
        <div>
          <div class="section-title">최근 견적 현황</div>
          <div class="card" id="recent-list"></div>
        </div>
      </div>
      <div class="section-title" style="margin-top:1rem;">월별 수주율 추이</div>
      <div class="card card-pad">
        <div style="height:200px;"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>

    <div id="tab-inquiries" class="content">
      <div class="filter-bar">
        <select id="f-rep" onchange="renderTable()"><option value="">전체 담당자</option><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select>
        <select id="f-status" onchange="renderTable()"><option value="">전체 상태</option><option>대기중</option><option>견적완료</option><option>수주</option><option>미수주</option></select>
        <span style="flex:1;"></span>
        <button class="btn btn-sm" style="color:#1D9E75; border-color:#1D9E75;" onclick="exportExcel()">엑셀 다운로드</button>
        <span id="table-count" style="font-size:12px;color:var(--text-secondary); margin-left:10px;"></span>
      </div>
      <div class="card table-wrap">
        <table>
          <thead><tr>
            <th>문의일</th><th>담당자</th><th>고객사</th><th>Cat No.</th><th>제품명</th><th>CAS No.</th><th>Package</th><th>수량</th><th>금액</th><th>상태</th><th>액션</th>
          </tr></thead>
          <tbody id="inq-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-notifications" class="content">
      <div class="section-title">알림 내역</div>
      <div class="card" id="notif-list"></div>
    </div>

    <div id="tab-analytics" class="content">
      <div class="two-col">
        <div class="card card-pad"><div class="section-title">담당자별 수주 건수</div><div style="height:220px;"><canvas id="rep-chart"></canvas></div></div>
        <div class="card card-pad"><div class="section-title">전체 결과 현황</div><div style="height:220px;"><canvas id="result-chart"></canvas></div></div>
      </div>
      <div class="card card-pad"><div class="section-title">담당자별 수주율 비교</div><div style="height:200px;"><canvas id="rate-chart"></canvas></div></div>
    </div>

  </div>
</div>

<div class="overlay" id="inq-modal">
  <div class="modal">
    <div class="modal-head"><h2>신규 견적 문의 등록</h2><button class="btn" style="border:none;font-size:20px;" onclick="closeModal('inq-modal')">×</button></div>
    <div class="modal-body">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div class="fg"><label>영업담당자</label><select id="i-rep"><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select></div>
        <div class="fg"><label>고객사</label><input id="i-customer" type="text" placeholder="고객사명"></div>
        <div class="fg"><label>Cat No.</label><input id="i-partno" type="text" placeholder="예: G7513"></div>
        <div class="fg"><label>제품명</label><input id="i-product" type="text" placeholder="제품명"></div>
        <div class="fg"><label>CAS No.</label><input id="i-casno" type="text" placeholder="예: 67-68-5"></div>
        <div class="fg"><label>Package</label><input id="i-pkg" type="text" placeholder="예: 500mL"></div>
        <div class="fg"><label>수량</label><input id="i-qty" type="text" placeholder="수량"></div>
      </div>
      <div class="fg"><label>메모 (구매팀 전달사항)</label><textarea id="i-memo" rows="3" placeholder="상세 요청사항을 적어주세요."></textarea></div>
      <div id="inq-status" class="status-banner">전송 중...</div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('inq-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry()">등록 + 알림 전송</button>
    </div>
  </div>
</div>

<div class="overlay" id="quote-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 정보 입력</h2><button class="btn" style="border:none;font-size:20px;" onclick="closeModal('quote-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="quote-info" style="margin-bottom:15px; font-size:12px; color:var(--text-secondary); background:#f9f9f9; padding:10px; border-radius:8px;"></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div class="fg"><label>견적 금액 (원)</label><input id="q-price" type="number"></div>
        <div class="fg"><label>납기 가능일</label><input id="q-delivery" type="date"></div>
      </div>
      <div class="fg"><label>공급사</label><input id="q-supplier" type="text"></div>
      <div class="fg"><label>구매팀 메모</label><textarea id="q-memo" rows="3"></textarea></div>
      <div id="quote-status" class="status-banner">전송 중...</div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('quote-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitQuote()">견적 저장 + 영업팀 알림</button>
    </div>
  </div>
</div>

<div class="overlay" id="result-modal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-head"><h2>수주 결과 확정</h2><button class="btn" style="border:none;font-size:20px;" onclick="closeModal('result-modal')">×</button></div>
    <div class="modal-body">
      <div id="result-info" style="margin-bottom:12px; font-size:13px;"></div>
      <div class="fg"><label>수주 결과</label><select id="r-result"><option value="수주">수주 (Success)</option><option value="미수주">미수주 (Lost)</option></select></div>
      <div class="fg"><label>결과 사유 메모</label><textarea id="r-memo" rows="2"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('result-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitResult()">저장</button>
    </div>
  </div>
</div>

<script>
// ── 파이어베이스 설정 ──────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDXolC9bL4pdBAcLTHC2tsEAmKkCilYAVw",
  authDomain: "avention-quote.firebaseapp.com",
  projectId: "avention-quote",
  storageBucket: "avention-quote.firebasestorage.app",
  messagingSenderId: "963602798000",
  appId: "1:963602798000:web:b9f126a5c44270c4c0b275"
};

const CONFIG = {
  discordBuyer: 'https://discord.com/api/webhooks/1490536970223353947/fzC0wssKrg5FDqkURsh-PUpK7xfJzWNAcDyiFSxsczbQSYCLJGhSewbjeMf0lofc3iLc',
  discordRep:   'https://discord.com/api/webhooks/1490537189795303435/IZH8O3AXoP9vSE3EJc6sNJmM-MMWVjcUL32ufess1JfoX2w1JW9zrN8dv71TWsL-drQa',
  sheetsUrl: 'https://script.google.com/macros/s/AKfycbzUX87JH06siBmOZ4ajXAxPh7y9DnPd23AN5CMaQe7if6kZywQy4p7OlINSoaihBr-Y/exec'
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let inquiries = [];
let notifs = [];
const charts = {};
const STATUS_BADGE = { '대기중':'b-wait', '견적완료':'b-quoted', '수주':'b-won', '미수주':'b-lost' };

// 🔒 [소유님 요청] 로그인 감지 및 보안 체크 (Avention 전용)
auth.onAuthStateChanged((user) => {
  if (user) {
    const isAvention = user.email.endsWith('@avention.co.kr');
    const isSoyoo = user.email === 'ink@avention.co.kr';

    if (isAvention || isSoyoo) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-app').classList.add('show');
      document.getElementById('user-info').textContent = `${user.displayName} 소유님 접속 중`;
      startSync(); // 🎆 파이어베이스 연동 시작
    } else {
      alert("접근 권한이 없습니다. 어벤션 회사 계정으로 로그인해주세요.");
      auth.signOut();
    }
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').classList.remove('show');
  }
});

function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout() { auth.signOut(); }

// 🎆 [소유님 요청] Firework(Firebase) 실시간 동기화
function startSync() {
  db.collection("inquiries").orderBy("id", "desc").onSnapshot(snap => {
    inquiries = snap.docs.map(doc => doc.data());
    renderAll();
  });
  db.collection("notifs").orderBy("id", "desc").limit(10).onSnapshot(snap => {
    notifs = snap.docs.map(doc => doc.data());
    renderNotifs();
    updateBadges();
  });
}

// ── 데이터 처리 함수들 ────────────────────────────────
async function submitInquiry() {
  const rep=document.getElementById('i-rep').value;
  const customer=document.getElementById('i-customer').value.trim();
  const product=document.getElementById('i-product').value.trim();
  if(!customer || !product) return alert("고객사와 제품명을 입력해주세요.");

  const inq = {
    id: Date.now(), date: new Date().toISOString().slice(0,10),
    rep, customer, product,
    partNo: document.getElementById('i-partno').value.trim(),
    casNo: document.getElementById('i-casno').value.trim(),
    pkg: document.getElementById('i-pkg').value.trim(),
    qty: document.getElementById('i-qty').value.trim(),
    memo: document.getElementById('i-memo').value.trim(),
    status: '대기중', price: null
  };

  await db.collection("inquiries").doc(String(inq.id)).set(inq);
  await db.collection("notifs").add({ id: Date.now(), text: `${rep} → 구매: ${customer} 견적 요청`, time: nowStr(), unread: true });
  
  // 디스코드 발송 등 추가 로직 가능
  closeModal('inq-modal');
}

async function submitQuote() {
  const i = inquiries.find(x => x.id === quoteTarget);
  const updates = {
    price: parseInt(document.getElementById('q-price').value) || null,
    delivery: document.getElementById('q-delivery').value,
    supplier: document.getElementById('q-supplier').value,
    memo: document.getElementById('q-memo').value,
    status: '견적완료',
    quoteDate: new Date().toISOString().slice(0,10)
  };
  await db.collection("inquiries").doc(String(quoteTarget)).update(updates);
  await db.collection("notifs").add({ id: Date.now(), text: `구매 → ${i.rep}: ${i.customer} 견적 완료`, time: nowStr(), unread: true });
  closeModal('quote-modal');
}

async function submitResult() {
  const i = inquiries.find(x => x.id === resultTarget);
  const newStatus = document.getElementById('r-result').value;
  await db.collection("inquiries").doc(String(resultTarget)).update({
    status: newStatus,
    resultMemo: document.getElementById('r-memo').value
  });
  await db.collection("notifs").add({ id: Date.now(), text: `수주결과 → ${i.rep}: ${i.customer} [${newStatus}]`, time: nowStr(), unread: true });
  closeModal('result-modal');
}

async function deleteInq(id) {
  if(confirm("정말 삭제하시겠습니까?")) await db.collection("inquiries").doc(String(id)).delete();
}

// ── 렌더링 로직 (소유님 디자인 계승) ──────────────────────
function renderAll() {
  renderMetrics(); renderRepStats(); renderRecent(); renderTable();
  if(document.getElementById('tab-dashboard').classList.contains('active')) setTimeout(renderTrend, 100);
}

function renderMetrics() {
  const total = inquiries.length;
  const won = inquiries.filter(i => i.status === '수주').length;
  const pending = inquiries.filter(i => i.status === '대기중').length;
  const decided = won + inquiries.filter(i => i.status === '미수주').length;
  const rate = decided > 0 ? Math.round(won/decided*100) : 0;
  const totalAmt = inquiries.filter(i=>i.status==='수주').reduce((s,i)=>s+(i.price||0), 0);

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">전체 견적 문의</div><div class="metric-value">${total}건</div></div>
    <div class="metric"><div class="metric-label">수주율</div><div class="metric-value green">${rate}%</div></div>
    <div class="metric"><div class="metric-label">대기중 (미견적)</div><div class="metric-value amber">${pending}건</div></div>
    <div class="metric"><div class="metric-label">수주 총액</div><div class="metric-value">${(totalAmt/1000000).toFixed(1)}M원</div></div>
  `;
}

function renderRepStats() {
  const reps = ['BML','LSB','POL','YSJ'];
  document.getElementById('rep-stats').innerHTML = reps.map(rep => {
    const mine = inquiries.filter(i => i.rep === rep);
    const won = mine.filter(i => i.status === '수주').length;
    const decided = won + mine.filter(i => i.status === '미수주').length;
    const rate = decided > 0 ? Math.round(won/decided*100) : 0;
    return `
      <div class="rep-row">
        <div class="avatar">${rep[0]}</div>
        <div style="flex:1;">
          <div style="display:flex; justify-content:space-between; font-size:12px;"><span><strong>${rep}</strong></span><span>${rate}%</span></div>
          <div class="prog"><div class="prog-fill" style="width:${rate}%"></div></div>
        </div>
      </div>`;
  }).join('');
}

function renderRecent() {
  document.getElementById('recent-list').innerHTML = inquiries.slice(0, 5).map(i => `
    <div class="notif-item">
      <span class="badge ${STATUS_BADGE[i.status]}">${i.status}</span>
      <span style="font-size:12px; margin-left:10px;"><strong>${i.customer}</strong> - ${i.product}</span>
    </div>`).join('');
}

function renderTable() {
  const r = document.getElementById('f-rep').value;
  const s = document.getElementById('f-status').value;
  const filtered = inquiries.filter(i => (!r || i.rep === r) && (!s || i.status === s));
  
  document.getElementById('table-count').textContent = `총 ${filtered.length}건`;
  document.getElementById('inq-tbody').innerHTML = filtered.map(i => `
    <tr>
      <td style="font-size:11px;color:#888;">${i.date}</td>
      <td>${i.rep}</td>
      <td><strong>${i.customer}</strong></td>
      <td style="font-size:11px;">${i.partNo||'-'}</td>
      <td>${i.product}</td>
      <td style="font-size:11px;">${i.casNo||'-'}</td>
      <td>${i.pkg||'-'}</td>
      <td>${i.qty||'-'}</td>
      <td>${i.price ? '₩'+(i.price/10000).toFixed(0)+'만' : '-'}</td>
      <td><span class="badge ${STATUS_BADGE[i.status]}">${i.status}</span></td>
      <td style="display:flex;gap:5px;">
        <button class="btn btn-sm" onclick="openQuoteModal(${i.id})">수정</button>
        ${i.status==='견적완료' ? `<button class="btn btn-sm" style="color:green;" onclick="openResultModal(${i.id})">확정</button>` : ''}
        <button class="btn btn-sm" style="color:red;" onclick="deleteInq(${i.id})">삭제</button>
      </td>
    </tr>`).join('');
}

function renderNotifs() {
  document.getElementById('notif-list').innerHTML = notifs.map(n => `
    <div class="notif-item ${n.unread?'unread':''}">
      <div style="display:flex; align-items:center; gap:8px;">
        ${n.unread?'<span class="dot"></span>':''}
        <span>${n.text}</span>
        <span class="gmail-badge">알림</span>
      </div>
      <div style="font-size:11px; color:#aaa; margin-top:4px;">${n.time}</div>
    </div>`).join('');
}

// ── 유틸리티 및 디자인 보조 ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='analytics') setTimeout(renderAnalytics, 100);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openQuoteModal(id) { 
  quoteTarget=id; 
  const i=inquiries.find(x=>x.id===id);
  document.getElementById('quote-info').textContent = `${i.customer} / ${i.product} / ${i.memo || ''}`;
  openModal('quote-modal'); 
}

function openResultModal(id) {
  resultTarget=id;
  const i=inquiries.find(x=>x.id===id);
  document.getElementById('result-info').textContent = `${i.customer} - ${i.product}`;
  openModal('result-modal');
}

function nowStr() { return new Date().toLocaleString('ko-KR').slice(5, -3); }

function updateBadges() {
  const pending = inquiries.filter(i=>i.status==='대기중').length;
  document.getElementById('pending-dot').innerHTML = pending > 0 ? '<span class="dot"></span>' : '';
}

function renderTrend() {
  if(charts.trend) charts.trend.destroy();
  const ctx = document.getElementById('trend-chart');
  charts.trend = new Chart(ctx, {
    type:'line',
    data:{ labels:['1월','2월','3월','4월'], datasets:[{ label:'수주율', data:[45,52,48,60], borderColor:'#1D9E75', fill:true, backgroundColor:'rgba(29,158,117,0.05)', tension:0.4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
  });
}

function renderAnalytics() {
  ['rep-chart','result-chart','rate-chart'].forEach(id=>{ if(charts[id]) charts[id].destroy(); });
  const ctx1 = document.getElementById('rep-chart');
  charts['rep-chart'] = new Chart(ctx1, { type:'doughnut', data:{ labels:['BML','LSB','POL','YSJ'], datasets:[{ data:[10,15,8,5], backgroundColor:['#378ADD','#1D9E75','#D85A30','#7F77DD'] }] }, options:{responsive:true, maintainAspectRatio:false} });
}

function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(inquiries);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "견적내역");
  XLSX.writeFile(wb, `어벤션_견적_${new Date().toISOString().slice(0,10)}.xlsx`);
}
</script>
