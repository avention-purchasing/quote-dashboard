<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 수주율 관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
  /* 🎨 소유님의 원본 CSS 코드 100% 보존 (절대 수정하지 않음) */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeece6;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #a0a09a;
    --text-info: #0c447c;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --bg-info: #0c2440;
      --text-primary: #f0ede6;
      --text-secondary: #a0a09a;
      --text-tertiary: #6b6b67;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
    }
  }

  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
  .app { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
  .shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }

  /* Header */
  .header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 17px; font-weight: 600; }
  .header-left p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; padding: 0 1.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text-primary); }

  /* Content */
  .content { padding: 1.5rem; display: none; }
  .content.active { display: block; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
  .green { color: #3B6D11; } .amber { color: #854F0B; }
  @media (prefers-color-scheme: dark) { .green { color: #97C459; } .amber { color: #EF9F27; } }

  /* Two-col */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  /* Cards */
  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .card-pad { padding: 1rem; }
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-secondary); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .b-wait { background: #FAEEDA; color: #633806; }
  .b-quoted { background: #E6F1FB; color: #0C447C; }
  .b-won { background: #EAF3DE; color: #27500A; }
  .b-lost { background: #FCEBEB; color: #791F1F; }

  /* Buttons */
  .btn { padding: 7px 14px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-primary); font-family: var(--font); transition: background 0.15s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

  /* Notification dot */
  .dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 1.1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-head h2 { font-size: 15px; font-weight: 500; }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-foot { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .x-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-secondary); line-height: 1; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-full { grid-column: 1 / -1; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .fg input, .fg select, .fg textarea {
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    padding: 8px 10px; font-size: 13px; font-family: var(--font);
    background: var(--bg-primary); color: var(--text-primary);
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--border-hover); }
  .fg textarea { resize: vertical; min-height: 65px; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-bar select { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; font-size: 12px; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); }

  /* Status banner */
  .status-banner { background: var(--bg-info); border: 0.5px solid #b5d4f4; border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-info); margin-top: 10px; display: none; align-items: center; gap: 7px; }
  .status-banner.show { display: flex; }

  /* Rep rows */
  .rep-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .rep-row:last-child { border-bottom: none; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .av-b { background: #B5D4F4; color: #0C447C; }
  .av-t { background: #9FE1CB; color: #085041; }
  .av-c { background: #F5C4B3; color: #712B13; }
  .av-p { background: #CECBF6; color: #3C3489; }
  .rep-name { font-size: 13px; font-weight: 500; min-width: 50px; }
  .rep-meta { font-size: 11px; color: var(--text-secondary); flex: 1; display: flex; gap: 12px; }
  .rep-meta b { color: var(--text-primary); }
  .rate-wrap { min-width: 70px; text-align: right; }
  .rate-num { font-size: 13px; font-weight: 600; }
  .prog { width: 100%; height: 5px; background: var(--bg-secondary); border-radius: 3px; margin-top: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: #639922; }

  /* Recent list */
  .recent-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .recent-item:last-child { border-bottom: none; }

  /* Notification */
  .notif-item { padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }
  .notif-item.unread { background: var(--bg-info); }
  .notif-text { font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .notif-time { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; padding-left: 13px; }

  /* Gmail badge */
  .gmail-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 10px; background: #FAECE7; color: #712B13; }

  /* Empty */
  .empty { padding: 2rem; text-align: center; color: var(--text-secondary); font-size: 13px; }

  /* Info box */
  .info-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }

  /* Chart wrap */
  .chart-wrap { position: relative; width: 100%; }

  /* Login Screen */
  #login-screen { position: fixed; inset: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; z-index: 5000; }
  .login-card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2.5rem 2rem; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
  .google-btn { width: 100%; padding: 12px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: var(--bg-primary); cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-primary); transition: 0.2s; }
  .google-btn:hover { background: var(--bg-secondary); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="margin-bottom:10px; font-size:18px;">어벤션 견적 관리</h1>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">회사 계정(@avention.co.kr)으로 로그인하세요.</p>
    <button class="google-btn" onclick="loginWithGoogle()">Google 로그인</button>
  </div>
</div>

<div class="app" id="main-app">
  <div class="shell">
    <div class="header">
      <div class="header-left">
        <h1>견적 수주율 관리 대시보드</h1>
        <p id="user-info">어벤션 견적 관리</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="pending-notif" style="display:none;font-size:12px;color:#854F0B;background:#FAEEDA;padding:5px 10px;border-radius:20px;"></span>
        <button class="btn btn-primary" onclick="openModal('inq-modal')">+ 견적 문의 등록</button>
        <button class="btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
      <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
      <div class="tab" onclick="switchTab('notifications',this)">알림 <span id="notif-dot"></span></div>
      <div class="tab" onclick="switchTab('analytics',this)">분석</div>
    </div>

    <div id="tab-dashboard" class="content active">
      <div class="metrics" id="metrics"></div>
      <div class="two-col">
        <div>
          <div class="section-title">영업담당자별 수주율</div>
          <div class="card card-pad" id="rep-stats"></div>
        </div>
        <div>
          <div class="section-title">최근 견적 현황</div>
          <div class="card" id="recent-list"></div>
        </div>
      </div>
      <div class="section-title" style="margin-top:1rem;">월별 수주율 추이</div>
      <div class="card card-pad">
        <div class="chart-wrap" style="height:200px;"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>

    <div id="tab-inquiries" class="content">
      <div class="filter-bar">
        <select id="f-rep" onchange="renderTable()"><option value="">전체 담당자</option><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select>
        <select id="f-status" onchange="renderTable()">
          <option value="">전체 상태</option>
          <option>대기중</option>
          <option>견적완료</option>
          <option>수주</option>
          <option>미수주</option>
          <option>견적불가</option>
        </select>
        <span style="flex:1;"></span>
        <span id="table-count" style="font-size:12px;color:var(--text-secondary);"></span>
      </div>
      <div class="card table-wrap">
        <table>
          <thead><tr>
            <th>문의일</th><th>담당자</th><th>고객사</th><th>Cat No.</th><th>제품명</th><th>CAS No.</th><th>Package</th><th>수량</th><th>금액</th><th>납기</th><th>상태</th><th>메모</th><th>액션</th>
          </tr></thead>
          <tbody id="inq-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-notifications" class="content">
      <div class="section-title">알림 내역</div>
      <div class="card" id="notif-list"></div>
    </div>

    <div id="tab-analytics" class="content">
      <div class="two-col">
        <div>
          <div class="section-title">담당자별 수주 건수</div>
          <div class="card card-pad"><div class="chart-wrap" style="height:220px;"><canvas id="rep-chart"></canvas></div></div>
        </div>
        <div>
          <div class="section-title">전체 결과 현황</div>
          <div class="card card-pad"><div class="chart-wrap" style="height:220px;"><canvas id="result-chart"></canvas></div></div>
        </div>
      </div>
      <div class="section-title">담당자별 수주율 비교</div>
      <div class="card card-pad"><div class="chart-wrap" style="height:200px;"><canvas id="rate-chart"></canvas></div></div>
    </div>
  </div></div><div class="overlay" id="inq-modal">
  <div class="modal">
    <div class="modal-head"><h2>신규 견적 문의 등록</h2><button class="x-btn" onclick="closeModal('inq-modal')">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg"><label>영업담당자</label><select id="i-rep"><option>BML</option><option>LSB</option><option>POL</option><option>YSJ</option></select></div>
        <div class="fg"><label>고객사</label><input id="i-customer" type="text" placeholder="고객사명"></div>
        <div class="fg"><label>Cat No.</label><input id="i-partno" type="text" placeholder="예: G7513"></div>
        <div class="fg"><label>제품명</label><input id="i-product" type="text" placeholder="제품명"></div>
        <div class="fg"><label>CAS No.</label><input id="i-casno" type="text" placeholder="예: 67-68-5"></div>
        <div class="fg"><label>Package</label><input id="i-pkg" type="text" placeholder="예: 500mL, 1g, 96well"></div>
        <div class="fg"><label>수량</label><input id="i-qty" type="text" placeholder="수량"></div>
      </div>
      <div id="inq-status" class="status-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7L12 13 2 7"/></svg>
        <span id="inq-status-text"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('inq-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry()">등록 + 구매담당자 알림</button>
    </div>
  </div>
</div>

<div class="overlay" id="quote-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 입력</h2><button class="x-btn" onclick="closeModal('quote-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="quote-info"></div>
      <div class="form-grid">
        <div class="fg"><label>견적 금액 (원)</label><input id="q-price" type="number" placeholder="0"></div>
        <div class="fg"><label>예상 납기</label><input id="q-delivery" type="text" placeholder="예: 2~3주, 1달 등"></div>
        <div class="fg"><label>공급사</label><input id="q-supplier" type="text" placeholder="공급사명"></div>
        <div class="fg"><label>처리 상태</label><select id="q-status"><option value="견적완료">정상 견적</option><option value="견적불가">견적 불가</option></select></div>
        <div class="fg form-full"><label>메모</label><textarea id="q-memo" placeholder="사유 또는 특이사항"></textarea></div>
      </div>
      <div id="quote-status" class="status-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7L12 13 2 7"/></svg>
        <span id="quote-status-text"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('quote-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitQuote()">견적 저장 + 영업팀 알림</button>
    </div>
  </div>
</div>

<div class="overlay" id="result-modal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-head"><h2>수주 여부 업데이트</h2><button class="x-btn" onclick="closeModal('result-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="result-info"></div>
      <div class="fg" style="margin-top:12px;">
        <label>수주 결과</label>
        <select id="r-result">
          <option value="수주">수주</option>
          <option value="미수주">미수주</option>
          <option value="견적불가">견적불가</option>
        </select>
      </div>
      <div class="fg" style="margin-top:12px;">
        <label>메모 (선택)</label>
        <textarea id="r-memo" placeholder="미수주 사유 등"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('result-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitResult()">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="log-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 이력 및 코멘트</h2><button class="x-btn" onclick="closeModal('log-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="log-info" style="font-weight:bold; color:var(--text-primary);"></div>
      <div id="log-container" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; font-size: 12px; background: var(--bg-secondary); padding: 10px; border-radius: var(--radius-md);"></div>
      <div class="fg form-full">
        <label>영업팀 코멘트 (재견적 요청 등)</label>
        <textarea id="l-comment" placeholder="재견적 요청 시 구매팀에 알림이 전송되며, 상태가 다시 '대기중'으로 변경됩니다."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('log-modal')">닫기</button>
      <button class="btn btn-primary" onclick="submitComment()">코멘트 등록</button>
    </div>
  </div>
</div>

<script>
// ── 설정 ──────────────────────────────

function startSync() {
  db.collection("inquiries").orderBy("id", "desc").onSnapshot(snap => { 
    inquiries = snap.docs.map(doc => doc.data()); 
    nextId = Math.max(...inquiries.map(i=>i.id), 0) + 1;
    renderAll(); 
  });
  db.collection("notifs").orderBy("id", "desc").limit(30).onSnapshot(snap => { 
    notifs = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() })); 
    renderNotifs(); 
    updateBadges(); 
  });
}

function isLastDayOfMonth(date) {
  const nextDay = new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
  return nextDay.getDate() === 1;
}

async function sendExcelToDiscord() {
  const today = new Date();
  const monthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
  const lastSent = localStorage.getItem('lastExcelSentMonth');

  if (isLastDayOfMonth(today) && lastSent !== monthStr) {
    const ws = XLSX.utils.json_to_sheet(inquiries);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "견적내역");
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const formData = new FormData();
    formData.append('file', blob, `어벤션_견적관리_${monthStr}.xlsx`);
    formData.append('payload_json', JSON.stringify({ content: `📊 **${monthStr}월 어벤션 견적 수주율 결산 데이터입니다.**` }));
    try { await fetch(CONFIG.discordExcel, { method: 'POST', body: formData }); localStorage.setItem('lastExcelSentMonth', monthStr); } catch (e) { console.error('엑셀 전송 실패:', e); }
  }
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  el.classList.add('active');

}

function getStats() {
  const won = inquiries.filter(i=>i.status==='수주').length;
  const lost = inquiries.filter(i=>i.status==='미수주').length;
  const pending = inquiries.filter(i=>i.status==='대기중').length;
  const decided = won + lost; 
  const rate = decided > 0 ? Math.round(won/decided*100) : 0;
  const totalAmt = inquiries.filter(i=>i.status==='수주'&&i.price).reduce((s,i)=>s+i.price,0);
  return { total:inquiries.length, won, lost, pending, decided, rate, totalAmt };
}

  reps.forEach((rep,i)=>{
    const mine = inquiries.filter(x=>x.rep===rep);
    const won = mine.filter(x=>x.status==='수주').length;
    const decided = won + mine.filter(x=>x.status==='미수주').length;

    const initials = rep[0]+rep[rep.length-1];

  quoteTarget=id; const i=inquiries.find(x=>x.id===id); if(!i) return;
  document.getElementById('quote-info').textContent=`${i.rep} · ${i.customer} · ${i.product} · Cat No.: ${i.partNo||'-'} · CAS: ${i.casNo||'-'} · ${i.pkg||''} × ${i.qty||''}`;

}

async function submitQuote() {
  const i=inquiries.find(x=>x.id===quoteTarget); if(!i) return;
  
  const newPrice = parseInt(document.getElementById('q-price').value)||null;
  const newDelivery = document.getElementById('q-delivery').value;
  const newSupplier = document.getElementById('q-supplier').value;
  const newMemo = document.getElementById('q-memo').value;
  const qStatus = document.getElementById('q-status').value; 

  i.price = newPrice; i.delivery = newDelivery; i.supplier = newSupplier; i.status = qStatus; i.memo = newMemo; i.quoteDate = new Date().toISOString().slice(0,10);

  i.logs = i.logs || [];
  let logText = '';
  if(qStatus === '견적불가') {
    logText = '🚫 견적 불가\n';
    if(newMemo) logText += `사유/메모: ${newMemo}`;
  } else {
    logText = `✅ 견적완료\n💰 금액: ${newPrice ? '₩'+newPrice.toLocaleString() : '-'}\n🚚 예상 납기: ${newDelivery||'-'}\n🏢 공급사: ${newSupplier||'-'}`;
    if(newMemo) logText += `\n📝 메모: ${newMemo}`;
  }
  i.logs.push({ date: nowStr(), type: 'quote', text: logText });

  await db.collection("inquiries").doc(String(quoteTarget)).update(i);
  await db.collection("notifs").add({ id: Date.now(), text: `구매 → ${i.rep}: ${i.customer} ${i.product} [${qStatus}]`, time: nowStr(), unread: true });

  const sb=document.getElementById('quote-status'); const st=document.getElementById('quote-status-text'); sb.classList.add('show'); st.textContent='디스코드 알림 전송 중...';

  const embedTitle = qStatus === '견적불가' ? `🚫 견적 불가 — ${i.rep}님 확인해주세요` : `📨 견적 완료 — ${i.rep}님 확인해주세요`;
  const embedColor = qStatus === '견적불가' ? 0x999999 : 0x378ADD;
  await sendDiscord(CONFIG.discordRep, { title: embedTitle, color: embedColor, fields: [ { name: '담당자', value: i.rep, inline: true }, { name: '고객사', value: i.customer, inline: true }, { name: '제품명', value: i.product, inline: false }, { name: 'Cat No.', value: i.partNo||'-', inline: true }, { name: '견적 금액', value: i.price ? '₩'+i.price.toLocaleString() : '-', inline: true }, { name: '공급사', value: i.supplier||'-', inline: true }, { name: '예상 납기', value: i.delivery||'-', inline: true }, { name: '메모/사유', value: i.memo||'-', inline: false } ], footer: { text: '수주 여부는 대시보드 견적 목록 → 수주확정 버튼으로 업데이트해주세요' }, timestamp: new Date().toISOString() });
  st.textContent=`${i.rep}에게 디스코드 알림 전송 완료!`; setTimeout(()=>closeModal('quote-modal'), 1600);
}

function openLogModal(id) {
  logTarget = id; const i = inquiries.find(x => x.id === id); if(!i) return;
  
  document.getElementById('log-info').textContent = `${i.rep} · ${i.customer} · ${i.product} | 현재 견적: ${i.price ? '₩'+i.price.toLocaleString() : '미견적'}`;
  document.getElementById('l-comment').value = '';

  const container = document.getElementById('log-container');
  if(!i.logs || i.logs.length === 0) {
    container.innerHTML = '<div style="color:var(--text-tertiary); text-align:center; padding:10px;">이력이 없습니다.</div>';
  } else {
    container.innerHTML = i.logs.map(log => `
      <div style="margin-bottom:8px; padding-bottom:8px; border-bottom:0.5px solid var(--border);">
        <div style="color:var(--text-secondary); font-size:10px; margin-bottom:2px;">${log.date}</div>
        <div style="color:${log.type === 'quote' ? '#0C447C' : (log.type === 'comment' ? '#BA7517' : '#6b6b67')}; font-weight:500;">
          ${log.type === 'quote' ? '구매팀' : (log.type === 'comment' ? '영업팀' : '시스템')}
        </div>
        <div style="white-space:pre-wrap; line-height:1.4;">${log.text}</div>
      </div>
    `).join('');
  }
  openModal('log-modal');
}

async function submitComment() {
  const i = inquiries.find(x => x.id === logTarget); if(!i) return;
  const commentText = document.getElementById('l-comment').value.trim(); if(!commentText) { alert("코멘트를 입력해주세요."); return; }

  i.logs = i.logs || []; i.logs.push({ date: nowStr(), type: 'comment', text: commentText }); i.status = '대기중'; 

  await db.collection("inquiries").doc(String(logTarget)).update({ logs: i.logs, status: '대기중' });
  await db.collection("notifs").add({ id: Date.now(), text: `${i.rep} → 구매: ${i.customer} 재견적/코멘트 등록`, time: nowStr(), unread: true });

  // 🚨 디스코드 알림 제목 수정 반영
  await sendDiscord(CONFIG.discordBuyer, { title: '💬 영업팀 코멘트', color: 0xBA7517, fields: [ { name: '영업담당자', value: i.rep, inline: true }, { name: '고객사', value: i.customer, inline: true }, { name: '제품명', value: i.product, inline: false }, { name: '코멘트 내용', value: commentText, inline: false } ], footer: { text: '어벤션 견적 대시보드' }, timestamp: new Date().toISOString() });
  closeModal('log-modal');
}

function openResultModal(id) {
  resultTarget=id; const i=inquiries.find(x=>x.id===id); if(!i) return;
  document.getElementById('result-info').textContent=`${i.rep} · ${i.customer} · ${i.product} · ₩${i.price?i.price.toLocaleString():'-'}`;
  document.getElementById('r-result').value='수주'; document.getElementById('r-memo').value=i.memo||''; openModal('result-modal');
}

async function submitResult() {
  const i=inquiries.find(x=>x.id===resultTarget); if(!i) return;
  i.status=document.getElementById('r-result').value; i.memo=document.getElementById('r-memo').value;

  await db.collection("inquiries").doc(String(resultTarget)).update({ status: i.status, memo: i.memo });
  await db.collection("notifs").add({ id: Date.now(), text: `수주확정 → ${i.rep}: ${i.customer} ${i.product} [${i.status}]`, time: nowStr(), unread: true });
  closeModal('result-modal');
}

function nowStr() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  let hours = d.getHours();
  const minutes = String(d.getMinutes()).padStart(2, '0');
  const ampm = hours >= 12 ? '오후' : '오전';
  hours = hours % 12;
  hours = hours ? hours : 12; 
  const hh = String(hours).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}-${ampm} ${hh}:${minutes}`;
}

async function deleteInquiry(id) {
  const i = inquiries.find(x=>x.id===id); if(!i) return;
  if(!confirm(`[${i.customer}] ${i.product} 견적을 삭제하시겠습니까?`)) return;
  await db.collection("inquiries").doc(String(id)).delete();
}

function renderAll() {
  renderMetrics(); renderRepStats(); renderRecent(); updateBadges();
  if(document.getElementById('tab-dashboard').classList.contains('active')) setTimeout(renderTrend, 80);
  if(document.getElementById('tab-inquiries').classList.contains('active')) renderTable();
}
</script>
